<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battleships Room-Code Edition v2</title>
    
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .hidden { display: none; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .status { background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; color: #00ffca; min-height: 20px; }
        
        .setup-card { background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 320px; margin: 20px auto; border: 1px solid #333; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 6px; font-size: 1.2rem; width: 80%; text-align: center; margin-bottom: 10px; }
        
        .grid-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 15px; }
        .board-title { font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 100%; max-width: 320px; aspect-ratio: 1; margin: 0 auto; }
        
        .cell { background: #262626; aspect-ratio: 1; border-radius: 2px; border: 1px solid #1a1a1a; transition: background 0.2s; position: relative; }
        .cell.ship { background: #555; border: 1px solid #888; }
        .cell.hit { background: #ff3838; }
        .cell.miss { background: #3867ff; }
        
        .cell.hit::after { content: '×'; color: #fff; font-size: 14px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        
        button { background: #3498db; color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; width: 85%; margin: 8px 0; }
        button:active { background: #2980b9; }
    </style>
</head>
<body>

    <h1>Battleships P2P</h1>
    <div id="status-box" class="status">Connecting to network cluster...</div>

    <div id="lobby-screen" class="hidden">
        <div class="setup-card">
            <h3>Create or Join Game</h3>
            <p style="color: #aaa; font-size: 0.9rem;">Enter a matching code on both devices to link up instantly.</p>
            <input type="number" id="room-input" pattern="[0-9]*" placeholder="Enter Room Code">
            <button id="btn-start">Connect & Play</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="grid-container">
            <div>
                <div class="board-title" id="opponent-board-header">Opponent's Fleet</div>
                <div id="opponent-board" class="grid"></div>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid #222; margin: 5px 0;">
            <div>
                <div class="board-title">Your Fleet & Incoming Attacks</div>
                <div id="your-board" class="grid"></div>
            </div>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('status-box');
        let pubnub, myChannel, roomCode;
        let myRole = null; 
        let myTurn = false;
        
        let opponentBoardHits = Array(100).fill(0); 
        let yourFleetLocations = Array(100).fill(0); 

        function initNetwork() {
            // Initializing the connection using open global test tokens
            pubnub = new PubNub({
                publishKey: 'pub-c-8fa82b54-bc70-4d51-9c86-17fa003e8c11', 
                subscribeKey: 'sub-c-1a5ddbc5-fa80-4df2-a3bd-a5b50d53513a',
                userId: "user_" + Math.random().toString(36).substring(2, 7)
            });
            
            statusBox.innerText = "Connected. Enter a room code below.";
            document.getElementById('lobby-screen').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            roomCode = document.getElementById('room-input').value.trim();
            if (!roomCode) return alert("Please enter a room code.");
            
            myChannel = 'game_room_' + roomCode;
            statusBox.innerText = "Querying room occupancy status...";

            // Check how many people are in the room right now
            pubnub.hereNow({
                channels: [myChannel],
                includeUUIDs: false
            }).then((response) => {
                const occupantCount = response.channels[myChannel] ? response.channels[myChannel].occupancy : 0;
                
                if (occupantCount === 0) {
                    myRole = 'host';
                    myTurn = true;
                    statusBox.innerText = `Room ${roomCode}: You are Player 1. Waiting for Player 2...`;
                } else if (occupantCount === 1) {
                    myRole = 'guest';
                    myTurn = false;
                    statusBox.innerText = `Room ${roomCode}: You are Player 2. Connecting...`;
                } else {
                    statusBox.innerText = "This room is full! Try a different code.";
                    return;
                }

                // Register network operational triggers
                setupRoomSubscription();
            }).catch((error) => {
                console.error(error);
                statusBox.innerText = "Network look-up timeout. Try connecting again.";
            });
        });

        function setupRoomSubscription() {
            pubnub.addListener({
                status: function(statusEvent) {
                    if (statusEvent.category === "PNConnectedCategory" && myRole === 'guest') {
                        // Guest is inside. Signal Host that we are ready to activate.
                        pubnub.publish({ channel: myChannel, message: { type: 'join-sync' } });
                    }
                },
                message: function(event) {
                    const data = event.message;
                    if (event.publisher === pubnub.getUserId()) return; // Prevent echoing self

                    if (data.type === 'join-sync' && myRole === 'host') {
                        // Host hears the guest arrive. Trigger game launch.
                        statusBox.innerText = "Player 2 Connected! Your turn to strike.";
                        pubnub.publish({ channel: myChannel, message: { type: 'game-start-trigger' } });
                        initialiseGame();
                    }
                    else if (data.type === 'game-start-trigger' && myRole === 'guest') {
                        // Guest gets game initialization clearance from Host
                        statusBox.innerText = "Match Found! Opponent's turn.";
                        initialiseGame();
                    }
                    else if (data.type === 'shot') {
                        handleIncomingShot(data.coord);
                    }
                    else if (data.type === 'result') {
                        handleShotFeedback(data.coord, data.isHit);
                    }
                }
            });

            pubnub.subscribe({ channels: [myChannel] });
        }

        // --- CORE GAME ENGINE ---
        function initialiseGame() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateTurnHeader();

            // Mocking out 5 ship plots across fleet space
            yourFleetLocations[12] = 1;
            yourFleetLocations[25] = 1;
            yourFleetLocations[44] = 1;
            yourFleetLocations[57] = 1;
            yourFleetLocations[81] = 1;

            renderGrid('opponent-board', handleMyStrikeClick);
            renderGrid('your-board', null);
            updateVisualDisplays();
        }

        function renderGrid(containerId, clickHandler) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (clickHandler) cell.addEventListener('click', () => clickHandler(i));
                container.appendChild(cell);
            }
        }

        function updateVisualDisplays() {
            const oppCells = document.querySelectorAll('#opponent-board .cell');
            oppCells.forEach((cell, i) => {
                cell.className = 'cell';
                if (opponentBoardHits[i] === 1) cell.className = 'cell hit';
                if (opponentBoardHits[i] === 2) cell.className = 'cell miss';
            });

            const yourCells = document.querySelectorAll('#your-board .cell');
            yourCells.forEach((cell, i) => {
                cell.className = 'cell';
                if (yourFleetLocations[i] === 1) cell.className = 'cell ship';
                if (yourFleetLocations[i] === 2) cell.className = 'cell miss'; 
                if (yourFleetLocations[i] === 3) cell.className = 'cell hit';  
            });
        }

        function updateTurnHeader() {
            if (myTurn) {
                statusBox.style.color = "#00ffca";
                statusBox.innerText = "Your Turn to Strike!";
                document.getElementById('opponent-board-header').innerText = "Opponent's Fleet (READY TO FIRE)";
            } else {
                statusBox.style.color = "#ffb300";
                statusBox.innerText = "Opponent's Turn. Defend your fleet.";
                document.getElementById('opponent-board-header').innerText = "Opponent's Fleet (WAITING...)";
            }
        }

        function handleMyStrikeClick(coord) {
            if (!myTurn || opponentBoardHits[coord] !== 0) return;
            
            myTurn = false;
            updateTurnHeader();
            pubnub.publish({ channel: myChannel, message: { type: 'shot', coord: coord } });
        }

        function handleIncomingShot(coord) {
            const isHit = yourFleetLocations[coord] === 1;
            yourFleetLocations[coord] = isHit ? 3 : 2; 
            updateVisualDisplays();

            pubnub.publish({ channel: myChannel, message: { type: 'result', coord: coord, isHit: isHit } });
            
            myTurn = true;
            updateTurnHeader();
        }

        function handleShotFeedback(coord, isHit) {
            opponentBoardHits[coord] = isHit ? 1 : 2;
            updateVisualDisplays();
            updateTurnHeader();
        }

        window.addEventListener('load', initNetwork);
    </script>
</body>
</html>
