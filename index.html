<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battleships Room-Code Edition</title>
    
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .hidden { display: none; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .status { background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; color: #00ffca; min-height: 20px; }
        
        /* Room System Styling */
        .setup-card { background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 320px; margin: 20px auto; border: 1px solid #333; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 6px; font-size: 1.2rem; width: 80%; text-align: center; margin-bottom: 10px; }
        
        /* Grid Layouts */
        .grid-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 15px; }
        .board-title { font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 100%; max-width: 320px; aspect-ratio: 1; margin: 0 auto; }
        
        /* Cell States */
        .cell { background: #262626; aspect-ratio: 1; border-radius: 2px; border: 1px solid #1a1a1a; transition: background 0.2s; }
        .cell.ship { background: #555; border: 1px solid #888; } /* Your un-hit ships */
        .cell.hit { background: #ff3838; position: relative; } /* Hit targets */
        .cell.miss { background: #3867ff; } /* Missed targets */
        
        /* Little visual indicator dots inside cells */
        .cell.hit::after { content: '×'; color: #fff; font-size: 14px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        
        button { background: #3498db; color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; width: 85%; margin: 8px 0; }
        button:active { background: #2980b9; }
    </style>
</head>
<body>

    <h1>Battleships P2P</h1>
    <div id="status-box" class="status">Connecting to network cluster...</div>

    <div id="lobby-screen" class="hidden">
        <div class="setup-card">
            <h3>Create or Join Game</h3>
            <p style="color: #aaa; font-size: 0.9rem;">Enter a matching 4-digit code on both devices to pair instantly.</p>
            <input type="number" id="room-input" pattern="[0-9]*" placeholder="Enter 4-Digit Code" max="9999">
            <button id="btn-start">Connect & Play</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="grid-container">
            <div>
                <div class="board-title">Opponent's Fleet (Your Target)</div>
                <div id="opponent-board" class="grid"></div>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid #222; margin: 5px 0;">
            <div>
                <div class="board-title">Your Fleet & Incoming Attacks</div>
                <div id="your-board" class="grid"></div>
            </div>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('status-box');
        let pubnub, myChannel, roomCode;
        let myRole = null; // 'host' or 'guest'
        let myTurn = false;
        
        const boardSize = 10;
        
        // Tracking states
        let opponentBoardHits = Array(100).fill(0); // What WE did to them (0=empty, 1=hit, 2=miss)
        let yourFleetLocations = Array(100).fill(0); // 0=water, 1=ship, 2=incoming miss, 3=incoming hit

        // Connect to a global test pipeline instantly
        function initNetwork() {
            pubnub = new PubNub({
                publishKey: 'pub-c-8fa82b54-bc70-4d51-9c86-17fa003e8c11', // Public open developer tokens
                subscribeKey: 'sub-c-1a5ddbc5-fa80-4df2-a3bd-a5b50d53513a',
                userId: "user_" + Math.random().toString(36).substring(2, 7)
            });
            
            statusBox.innerText = "Connected. Enter a room code below.";
            document.getElementById('lobby-screen').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            roomCode = document.getElementById('room-input').value.trim();
            if (roomCode.length < 2) {
                alert("Please enter a valid code.");
                return;
            }
            
            myChannel = 'game_room_' + roomCode;
            statusBox.innerText = `Entering Room ${roomCode}...`;
            
            // Listen for communications inside this room channel
            pubnub.addListener({
                message: function(event) {
                    const data = event.message;
                    if (event.publisher === pubnub.getUserId()) return; // Ignore your own broadcast echoing back

                    if (data.type === 'ping' && myRole === 'host') {
                        // Guest arrived! Host responds confirming structure
                        myTurn = true;
                        statusBox.innerText = "Player 2 Connected! Your turn to strike.";
                        pubnub.publish({ channel: myChannel, message: { type: 'ack' } });
                        initialiseGame();
                    }
                    else if (data.type === 'ack' && myRole === 'guest') {
                        // Host responded to our discovery signal
                        statusBox.innerText = "Connected to Host. Opponent's turn.";
                        myTurn = false;
                        initialiseGame();
                    }
                    else if (data.type === 'shot') {
                        handleIncomingShot(data.coord);
                    }
                    else if (data.type === 'result') {
                        handleShotFeedback(data.coord, data.isHit);
                    }
                }
            });

            pubnub.subscribe({ channels: [myChannel] });

            // The first device to shout into the channel claims 'host'. 
            // If someone is already there, you become the 'guest'.
            myRole = 'host'; 
            
            // Broadcast your presence down the channel line
            setTimeout(() => {
                myRole = 'guest'; // Default down to guest during probe
                pubnub.publish({ channel: myChannel, message: { type: 'ping' } });
                
                // Set a short fallback window. If no host responds within 1 second, secure the Host role.
                setTimeout(() => {
                    if (statusBox.innerText.includes("Entering Room")) {
                        myRole = 'host';
                        statusBox.innerText = `Room ${roomCode}: Waiting for opponent to enter same code...`;
                    }
                }, 1000);
            }, 500);
        });

        // --- GAME ENGINE ---
        function initialiseGame() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            // Set up a basic template fleet (5 arbitrary test plots)
            // Replace with interactive placements later
            yourFleetLocations[12] = 1;
            yourFleetLocations[25] = 1;
            yourFleetLocations[44] = 1;
            yourFleetLocations[57] = 1;
            yourFleetLocations[81] = 1;

            renderGrid('opponent-board', handleMyStrikeClick);
            renderGrid('your-board', null);
            updateVisualDisplays();
        }

        function renderGrid(containerId, clickHandler) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (clickHandler) cell.addEventListener('click', () => clickHandler(i));
                container.appendChild(cell);
            }
        }

        function updateVisualDisplays() {
            // Update upper attacking targeting grid
            const oppCells = document.querySelectorAll('#opponent-board .cell');
            oppCells.forEach((cell, i) => {
                cell.className = 'cell';
                if (opponentBoardHits[i] === 1) cell.className = 'cell hit';
                if (opponentBoardHits[i] === 2) cell.className = 'cell miss';
            });

            // Update your base fleet layout AND reflect incoming strikes
            const yourCells = document.querySelectorAll('#your-board .cell');
            yourCells.forEach((cell, i) => {
                cell.className = 'cell';
                
                if (yourFleetLocations[i] === 1) cell.className = 'cell ship'; // Healthy ship
                if (yourFleetLocations[i] === 2) cell.className = 'cell miss'; // They targeted here but missed
                if (yourFleetLocations[i] === 3) cell.className = 'cell hit';  // They targeted here and CRASHED your ship!
            });
        }

        function handleMyStrikeClick(coord) {
            if (!myTurn || opponentBoardHits[coord] !== 0) return;
            
            statusBox.innerText = "Firing shell...";
            myTurn = false;
            
            pubnub.publish({ channel: myChannel, message: { type: 'shot', coord: coord } });
        }

        function handleIncomingShot(coord) {
            // Check if they successfully hit one of our layout plots
            const isHit = yourFleetLocations[coord] === 1;
            
            // Mark our fleet map state dynamically to reflect the hit/miss on our lower board
            yourFleetLocations[coord] = isHit ? 3 : 2; 
            updateVisualDisplays();

            // Send feedback back to the attacker immediately
            pubnub.publish({ channel: myChannel, message: { type: 'result', coord: coord, isHit: isHit } });
            
            myTurn = true;
            statusBox.style.color = "#00ffca";
            statusBox.innerText = "Your Turn to Strike!";
        }

        function handleShotFeedback(coord, isHit) {
            // Process the result of the strike WE threw
            opponentBoardHits[coord] = isHit ? 1 : 2;
            updateVisualDisplays();
            
            statusBox.style.color = "#ffb300";
            statusBox.innerText = "Opponent's Turn. Defend your fleet.";
        }

        window.addEventListener('load', initNetwork);
    </script>
</body>
</html>
