<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSL Receptive Skills Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container">
        <header>
            <h1>BSL Trainer Setup</h1>
            <p>Enter your username to track your fingerspelling metrics.</p>
        </header>
        <div class="input-panel">
            <input type="text" id="username-input" placeholder="e.g., Alex" autocomplete="off">
            <button id="btn-login" class="btn-success">Start Training</button>
        </div>
    </div>

    <div id="main-app-container" class="hidden">
        <header>
            <h1>BSL Fingerspelling Trainer</h1>
            <p>Welcome back, <span id="display-username" style="font-weight: bold; color: var(--primary);">User</span>!</p>
        </header>

        <main class="display-card">
            <div class="image-wrapper">
                <img id="sign-viewer" src="assets/letters/placeholder.png" alt="BSL Sign Placeholder">
            </div>
            <div id="status-indicator" class="status-idle">Ready</div>
        </main>

        <section class="controls-panel">
            <div class="control-group">
                <label for="difficulty-select">Difficulty:</label>
                <select id="difficulty-select">
                    <option value="easy">Easy (3 Letters)</option>
                    <option value="medium">Medium (5-6 Letters)</option>
                    <option value="hard">Hard (7+ Letters)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="speed-range">Speed: <span id="speed-val">800</span>ms</label>
                <input type="range" id="speed-range" min="200" max="1500" step="50" value="800">
            </div>

            <button id="btn-next" class="btn-primary">Get New Word</button>
            <button id="btn-replay" class="btn-secondary" disabled>Replay (Space)</button>
        </section>

        <section class="input-panel">
            <input type="text" id="user-guess" placeholder="Type what you see..." autocomplete="off" disabled>
            <button id="btn-submit" class="btn-success" disabled>Check</button>
        </section>

        <div id="feedback-message" class="feedback-container"></div>

        <hr class="divider">
        
        <section class="dashboard-panel">
            <h3>Your Metrics Dashboard</h3>
            <table class="metrics-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Correct</th>
                        <th>Attempts</th>
                        <th>Total Replays</th>
                    </tr>
                </thead>
                <tbody id="metrics-tbody">
                    </tbody>
            </table>

            <div class="csv-actions">
                <button id="btn-export" class="btn-dash">📥 Export Scores (CSV)</button>
                <label for="csv-import" class="btn-dash-label">📤 Import Scores (CSV)</label>
                <input type="file" id="csv-import" accept=".csv" style="display: none;">
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
