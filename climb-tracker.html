<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climbing Tracker</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --header-bg: #f1f5f9;
            --input-focus: #eff6ff;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-bg: #1e293b;
            --input-focus: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: background-color 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
            position: relative;
        }

        button, .dropdown-item-label {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        button:hover, .dropdown-item-label:hover {
            background-color: var(--primary-hover);
        }

        button.theme-toggle {
            background-color: transparent;
            color: var(--text-color);
            font-size: 1.2rem;
            padding: 6px;
            border-radius: 50%;
        }
        button.theme-toggle:hover {
            background-color: var(--header-bg);
        }

        button.danger {
            background-color: #ef4444;
            padding: 2px 5px;
            font-size: 0.65rem;
            line-height: 1;
            border-radius: 4px;
            min-width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button.danger:hover { background-color: #dc2626; }

        /* Dropdown Styling */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: var(--card-bg);
            min-width: 120px;
            box-shadow: 0px 8px 16px 0px rgb(0 0 0 / 0.15);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            z-index: 10;
            margin-top: 4px;
        }

        .dropdown:hover .dropdown-menu, 
        .dropdown:focus-within .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            color: var(--text-color);
            padding: 10px 14px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: left;
            background: none;
            border: none;
            width: 100%;
            box-sizing: border-box;
            font-weight: 500;
        }
        .dropdown-item:hover {
            background-color: var(--header-bg);
        }

        input[type="file"] { display: none; }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: var(--card-bg);
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            min-width: 85px;
            color: var(--text-color);
        }

        th {
            background-color: var(--header-bg);
            font-weight: 600;
            text-align: center;
        }

        .total-row td {
            font-weight: bold;
            background-color: var(--header-bg);
            text-align: center;
        }

        .child-header { position: relative; }

        .delete-child-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 2px 4px;
        }
        .delete-child-btn:hover { color: #ef4444; }

        .climb-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
            background: transparent;
            color: var(--text-color);
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: var(--input-focus);
        }

        .climb-name-input { text-align: left !important; font-weight: 500; }
        .hidden { display: none !important; }

        .footer-controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🧗 Climbing Tracker</h1>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>
    </header>

    <div class="controls-bar">
        <div class="btn-group">
            <button onclick="addChild()">+ Add Child</button>
            
            <div class="dropdown">
                <button type="button">Data ▾</button>
                <div class="dropdown-menu">
                    <label class="dropdown-item" style="margin: 0;">
                        📥 Import
                        <input type="file" id="importFile" accept=".json" onchange="importData(event)">
                    </label>
                    <button class="dropdown-item" onclick="exportData()">📤 Export</button>
                </div>
            </div>
        </div>

        <label class="checkbox-container">
            <input type="checkbox" id="toggleMoneyCheckbox" checked onchange="toggleMoneyColumn()">
            Show Earnings
        </label>
    </div>

    <div class="table-container">
        <table id="trackerTable">
            <thead>
                <tr id="headerRow1">
                    <th rowspan="2" style="min-width: 160px;">Climb</th>
                </tr>
                <tr id="headerRow2"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot id="tableFooter">
                <tr id="totalRow" class="total-row"></tr>
            </tfoot>
        </table>
    </div>

    <div class="footer-controls">
        <button onclick="addClimbRow()">+ Add Climb Row</button>
    </div>
</div>

<script>
    // App State
    let state = {
        theme: "light",
        showMoney: true,
        children: ["Child 1", "Child 2"],
        climbs: [
            { name: "Climb 1", data: { "Child 1": { grade: "V1", earn: "2.00" }, "Child 2": { grade: "V2", earn: "3.50" } } },
            { name: "Climb 2", data: { "Child 1": { grade: "V2", earn: "3.00" }, "Child 2": { grade: "V1", earn: "2.00" } } }
        ]
    };

    // Load Local Storage
    if (localStorage.getItem('climbingTrackerState_v4')) {
        try {
            state = JSON.parse(localStorage.getItem('climbingTrackerState_v4'));
        } catch (e) { console.error(e); }
    }

    function saveState() {
        localStorage.setItem('climbingTrackerState_v4', JSON.stringify(state));
    }

    function applyTheme() {
        document.documentElement.setAttribute('data-theme', state.theme);
        document.getElementById('themeBtn').innerHTML = state.theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        applyTheme();
        saveState();
    }

    function toggleMoneyColumn() {
        state.showMoney = document.getElementById('toggleMoneyCheckbox').checked;
        saveState();
        renderTable();
    }

    function renderTable() {
        const headerRow1 = document.getElementById('headerRow1');
        const headerRow2 = document.getElementById('headerRow2');
        const tableBody = document.getElementById('tableBody');
        const totalRow = document.getElementById('totalRow');
        const tableFooter = document.getElementById('tableFooter');

        document.getElementById('toggleMoneyCheckbox').checked = state.showMoney;

        // Manage Entire Footer Visibility based on Earnings Toggling
        if (state.showMoney) {
            tableFooter.style.display = "table-footer-group";
        } else {
            tableFooter.style.display = "none";
        }

        // Reset dynamic headers and rows
        headerRow1.innerHTML = '<th rowspan="2" style="min-width: 160px;">Climb</th>';
        headerRow2.innerHTML = '';
        tableBody.innerHTML = '';
        totalRow.innerHTML = '<td style="text-align: right;">Total Earned:</td>';

        const moneyTotals = {};

        // Build Headers
        state.children.forEach((child, childIdx) => {
            moneyTotals[child] = 0;

            const th = document.createElement('th');
            th.colSpan = state.showMoney ? 2 : 1;
            th.className = 'child-header';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.value = child;
            nameInput.style.fontWeight = 'bold';
            nameInput.onchange = (e) => renameChild(childIdx, e.target.value);
            th.appendChild(nameInput);

            const delBtn = document.createElement('button');
            delBtn.innerHTML = '✕';
            delBtn.className = 'delete-child-btn';
            delBtn.onclick = () => deleteChild(childIdx);
            th.appendChild(delBtn);

            headerRow1.appendChild(th);

            // Subheaders
            const thGrade = document.createElement('th');
            thGrade.textContent = 'Grade';
            headerRow2.appendChild(thGrade);

            if (state.showMoney) {
                const thEarn = document.createElement('th');
                thEarn.textContent = 'Earned';
                headerRow2.appendChild(thEarn);
            }
        });

        // Build Rows
        state.climbs.forEach((climb, climbIdx) => {
            const tr = document.createElement('tr');

            // Climb Title Box with Left-aligned Delete Row button
            const idTd = document.createElement('td');
            const cellWrapper = document.createElement('div');
            cellWrapper.className = 'climb-cell';

            const delRowBtn = document.createElement('button');
            delRowBtn.innerHTML = '✕';
            delRowBtn.className = 'danger';
            delRowBtn.title = "Delete Row";
            delRowBtn.onclick = () => deleteRow(climbIdx);
            cellWrapper.appendChild(delRowBtn);

            const idInput = document.createElement('input');
            idInput.type = 'text';
            idInput.className = 'climb-name-input';
            idInput.value = climb.name;
            idInput.onchange = (e) => { state.climbs[climbIdx].name = e.target.value; saveState(); };
            cellWrapper.appendChild(idInput);
            
            idTd.appendChild(cellWrapper);
            tr.appendChild(idTd);

            // Child Entries
            state.children.forEach(child => {
                if (!climb.data[child]) climb.data[child] = { grade: '', earn: '' };

                // Grade box
                const tdGrade = document.createElement('td');
                const inputGrade = document.createElement('input');
                inputGrade.type = 'text';
                inputGrade.value = climb.data[child].grade || '';
                inputGrade.onchange = (e) => { state.climbs[climbIdx].data[child].grade = e.target.value; saveState(); };
                tdGrade.appendChild(inputGrade);
                tr.appendChild(tdGrade);

                // Earned box
                if (state.showMoney) {
                    const tdEarn = document.createElement('td');
                    const inputEarn = document.createElement('input');
                    inputEarn.type = 'text';
                    inputEarn.value = climb.data[child].earn || '';
                    inputEarn.onchange = (e) => { 
                        state.climbs[climbIdx].data[child].earn = e.target.value; 
                        saveState(); 
                        renderTable(); 
                    };
                    tdEarn.appendChild(inputEarn);
                    tr.appendChild(tdEarn);

                    const cleanNum = parseFloat(climb.data[child].earn.replace(/[^0-9.]/g, ''));
                    if (!isNaN(cleanNum)) {
                        moneyTotals[child] += cleanNum;
                    }
                }
            });

            tableBody.appendChild(tr);
        });

        // Build Live Footer
        if (state.showMoney) {
            state.children.forEach(child => {
                const totalGradeCell = document.createElement('td');
                totalGradeCell.style.backgroundColor = 'var(--header-bg)'; 
                totalRow.appendChild(totalGradeCell);

                const totalEarnCell = document.createElement('td');
                totalEarnCell.textContent = moneyTotals[child] > 0 ? moneyTotals[child].toFixed(2) : '0.00';
                totalRow.appendChild(totalEarnCell);
            });
        }
    }

    function addChild() {
        const name = `Child ${state.children.length + 1}`;
        state.children.push(name);
        state.climbs.forEach(c => c.data[name] = { grade: '', earn: '' });
        saveState();
        renderTable();
    }

    function renameChild(idx, newName) {
        const old = state.children[idx];
        if (!newName.trim() || state.children.includes(newName)) { renderTable(); return; }
        state.children[idx] = newName;
        state.climbs.forEach(c => {
            if (c.data[old]) { c.data[newName] = c.data[old]; delete c.data[old]; }
        });
        saveState();
        renderTable();
    }

    function deleteChild(idx) {
        if (confirm(`Remove ${state.children[idx]}?`)) {
            const name = state.children[idx];
            state.children.splice(idx, 1);
            state.climbs.forEach(c => delete c.data[name]);
            saveState();
            renderTable();
        }
    }

    function addClimbRow() {
        const newClimb = { name: `Climb ${state.climbs.length + 1}`, data: {} };
        state.children.forEach(ch => newClimb.data[ch] = { grade: '', earn: '' });
        state.climbs.push(newClimb);
        saveState();
        renderTable();
    }

    function deleteRow(idx) {
        state.climbs.splice(idx, 1);
        saveState();
        renderTable();
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
        const a = document.createElement('a');
        a.setAttribute("href", dataStr);
        a.setAttribute("download", `climbing_tracker_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(a);
        a.click();
        a.remove();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const imported = JSON.parse(evt.target.result);
                if (imported.children && imported.climbs) {
                    state = imported;
                    if (state.theme === undefined) state.theme = "light";
                    if (state.showMoney === undefined) state.showMoney = true;
                    saveState();
                    applyTheme();
                    renderTable();
                    alert("Import successful!");
                } else { alert("Invalid structure."); }
            } catch (err) { alert("Error reading file."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    // App Initialize
    applyTheme();
    renderTable();
</script>

</body>
</html>
