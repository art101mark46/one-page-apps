<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serverless Battleships</title>
    
    <script src="peerjs.min.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="html5-qrcode.min.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .hidden { display: none; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .status { background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; }
        .qr-area { background: #fff; padding: 10px; border-radius: 8px; max-width: 250px; margin: 15px auto; display: flex; justify-content: center; }
        #reader { max-width: 300px; margin: 15px auto; background: #222; border-radius: 8px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-width: 350px; aspect-ratio: 1; margin: 15px auto; }
        .cell { background: #333; aspect-ratio: 1; border-radius: 2px; }
        .cell.target { background: #ff4444; }
        .cell.hit { background: red; }
        .cell.miss { background: blue; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin: 5px; }
    </style>
</head>
<body>

    <h1>WebRTC Battleships</h1>
    <div id="status-box" class="status">Initialising System...</div>

    <div id="connection-flow">
        <button id="btn-host">Host Game</button>
        <button id="btn-join">Join Game</button>
        
        <div id="host-ui" class="hidden">
            <p>Phone A: Displaying Join Token</p>
            <div id="qrcode" class="qr-area"></div>
            <p>Keep this screen open while Phone B scans.</p>
        </div>

        <div id="join-ui" class="hidden">
            <p>Phone B: Align camera to scan Phone A</p>
            <div id="reader"></div>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <h3>Game Active!</h3>
        <p>Turn: <span id="turn-display">Waiting...</span></p>
        <div id="opponent-board" class="grid"></div>
        <hr>
        <h4>Your Fleet</h4>
        <div id="your-board" class="grid"></div>
    </div>

    <script>
        const statusBox = document.getElementById('status-box');
        const turnDisplay = document.getElementById('turn-display');
        let peer, conn, html5QrcodeScanner;
        let myRole, myTurn = false;
        
        const boardSize = 10;
        let opponentBoardHits = Array(boardSize * boardSize).fill(0);
        let yourFleetLocations = Array(boardSize * boardSize).fill(0);

        function initPeer() {
            peer = new Peer();

            peer.on('open', (id) => {
                statusBox.innerText = "System Ready. Choose Role.";
                initHostFlow(id);
                initJoinFlow();
            });

            peer.on('error', (err) => {
                statusBox.innerText = `Network Error: ${err.type}`;
                console.error(err);
            });
        }

        // HOST FLOW (Phone A)
        function initHostFlow(hostId) {
            document.getElementById('btn-host').addEventListener('click', () => {
                myRole = 'host';
                document.getElementById('host-ui').classList.remove('hidden');
                document.getElementById('join-ui').classList.add('hidden');
                statusBox.innerText = "Waiting for Player 2 to join...";
                
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: hostId, width: 250, height: 250
                });
            });

            peer.on('connection', (c) => {
                setupConnection(c);
            });
        }

        // JOIN FLOW (Phone B)
        function initJoinFlow() {
            document.getElementById('btn-join').addEventListener('click', () => {
                myRole = 'client';
                document.getElementById('join-ui').classList.remove('hidden');
                document.getElementById('host-ui').classList.add('hidden');
                statusBox.innerText = "Starting Camera Engine...";

                // Instantiating the new camera tool
                html5QrcodeScanner = new Html5Qrcode("reader");
                
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, // Forces back camera cleanly
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        // Success Callback: Token Read!
                        html5QrcodeScanner.stop().then(() => {
                            document.getElementById('join-ui').classList.add('hidden');
                            connectToHost(decodedText);
                        });
                    },
                    (errorMessage) => { /* Soft ignore focus logs */ }
                ).catch(err => {
                    statusBox.innerText = "Camera failed. Verify HTTPS or permissions.";
                    console.error(err);
                });
            });
        }

        function connectToHost(hostId) {
            statusBox.innerText = `Connecting to Host...`;
            conn = peer.connect(hostId);
            setupConnection(conn);
        }

        function setupConnection(connection) {
            conn = connection;
            conn.on('open', () => {
                document.getElementById('connection-flow').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                statusBox.innerText = `Connected! Let's play.`;
                initialiseGame();
            });

            conn.on('data', (data) => {
                if (data.type === 'shot') handleOpponentShot(data.coord);
                if (data.type === 'result') handleShotResult(data.coord, data.isHit);
            });
        }

        function initialiseGame() {
            if (myRole === 'host') {
                myTurn = true;
                turnDisplay.innerText = "Your Turn";
            } else {
                myTurn = false;
                turnDisplay.innerText = "Opponent's Turn";
            }

            for (let i = 0; i < 5; i++) {
                yourFleetLocations[Math.floor(Math.random() * 100)] = 1;
            }

            renderGrid('opponent-board', handleMyShot);
            renderGrid('your-board', null);
            updateBoardDisplays();
        }

        function renderGrid(containerId, clickHandler) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (clickHandler) cell.addEventListener('click', () => clickHandler(i));
                container.appendChild(cell);
            }
        }

        function updateBoardDisplays() {
            const oppCells = document.querySelectorAll('#opponent-board .cell');
            oppCells.forEach((cell, i) => {
                if (opponentBoardHits[i] === 1) cell.className = 'cell hit';
                if (opponentBoardHits[i] === 2) cell.className = 'cell miss';
            });

            const yourCells = document.querySelectorAll('#your-board .cell');
            yourCells.forEach((cell, i) => {
                if (yourFleetLocations[i] === 1) cell.className = 'cell target';
            });
        }

        function handleMyShot(coord) {
            if (!myTurn || opponentBoardHits[coord] !== 0) return;
            conn.send({ type: 'shot', coord: coord });
            myTurn = false;
            turnDisplay.innerText = "Waiting for result...";
        }

        function handleOpponentShot(coord) {
            const isHit = yourFleetLocations[coord] === 1;
            conn.send({ type: 'result', coord: coord, isHit: isHit });
            myTurn = true;
            turnDisplay.innerText = "Your Turn";
        }

        function handleShotResult(coord, isHit) {
            opponentBoardHits[coord] = isHit ? 1 : 2;
            updateBoardDisplays();
            turnDisplay.innerText = "Opponent's Turn";
        }

        window.addEventListener('load', initPeer);
    </script>
</body>
</html>
