<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Turn-Based Minesweeper</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 10px; }

        /* Screens */
        .screen { display: none; width: 100%; max-width: 500px; background: #34495e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .active-screen { display: block; }

        /* Form Controls */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 4px; border: none; font-size: 16px; }
        input, select { background: #fff; color: #333; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 5px;}
        button:hover { background: #27ae60; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }

        /* Game Status layout */
        #game-info { text-align: center; margin-bottom: 15px; width: 100%; max-width: 400px;}
        .turn-indicator { font-size: 1.2rem; font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 10px;}
        .your-turn { background: #2ecc71; color: white; animation: pulse 1.5s infinite; }
        .their-turn { background: #e67e22; color: white; }

        /* Controls Panel */
        .controls-panel { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 400px; }
        .toggle-btn { background: #3498db; }
        .toggle-btn.flag-mode { background: #e74c3c; }
        .pass-btn { background: #f39c12; }
        .pass-btn:hover { background: #d35400; }

        /* Minesweeper Grid */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 35px); 
            gap: 2px; 
            background: #1a252f; 
            padding: 5px; 
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .cell {
            width: 35px;
            height: 35px;
            background: #95a5a6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border-radius: 2px;
            color: #333;
        }
        .cell:hover { background: #bdc3c7; }
        .cell.revealed { background: #ecf0f1; cursor: default; }
        .cell.mine { background: #e74c3c; color: white; }
        .cell.flagged { background: #f1c40f; color: #333; }

        /* Player List */
        #player-list { list-style: none; padding: 0; width: 100%; max-width: 400px; background: #1a252f; border-radius: 5px; padding: 10px;}
        #player-list li { padding: 5px 10px; border-bottom: 1px solid #34495e; display: flex; justify-content: space-between;}
        #player-list li:last-child { border-bottom: none; }
        .active-p { font-weight: bold; color: #2ecc71; }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="options-screen" class="screen active-screen">
        <h2>Game Options & Lobby</h2>
        <div class="form-group">
            <label for="player-name">Your Name Tag:</label>
            <input type="text" id="player-name" value="Player">
        </div>
        <div class="form-group">
            <label for="room-id">Room Code / Channel:</label>
            <input type="text" id="room-id" value="minesweeper-room-1">
        </div>
        <div class="form-group">
            <label for="player-limit">Player Limit Options:</label>
            <select id="player-limit">
                <option value="2">2 Players</option>
                <option value="3">3 Players</option>
                <option value="4">4 Players</option>
            </select>
        </div>
        <button id="join-btn" onclick="initPubNub()">Connect & Join Room</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-info">
            <div id="turn-banner" class="turn-indicator their-turn">Waiting for players...</div>
            <p id="room-display"></p>
        </div>

        <div class="controls-panel">
            <button id="mode-toggle" class="toggle-btn" onclick="toggleMode()">Mode: DIG</button>
            <button id="pass-button" class="pass-btn" onclick="passTurn()" disabled>Pass Turn</button>
        </div>

        <div id="grid"></div>

        <h3>Active Players</h3>
        <ul id="player-list"></ul>
    </div>

    <script>
        // --- GAME CONFIG & STATE ---
        const ROWS = 10;
        const COLS = 10;
        const MINE_COUNT = 15;
        
        let pubnub;
        let myUUID = 'user_' + Math.random().toString(36).substr(2, 9);
        let myName = "Player";
        let channelName = "";
        let playerLimit = 2;

        let players = []; // Array of objects: { uuid, name }
        let currentPlayerIndex = 0;
        let isMyTurn = false;
        
        // Mode: 'DIG' or 'FLAG'
        let currentMode = 'DIG'; 

        // Shared Board States
        let boardState = []; // 2D array tracking grid cells
        let gameOver = false;

        // --- INITIALIZE PUBNUB ---
        function initPubNub() {
            myName = document.getElementById('player-name').value.trim() || "Anonymous";
            channelName = document.getElementById('room-id').value.trim();
            playerLimit = parseInt(document.getElementById('player-limit').value);

            if(!channelName) return alert("Please enter a Room Code");

            // REPLACE THESE WITH YOUR ACTUAL PUBNUB KEYS
            pubnub = new PubNub({
                publishKey: 'YOUR_PUBLISH_KEY_HERE',
                subscribeKey: 'YOUR_SUBSCRIBE_KEY_HERE',
                userId: myUUID
            });

            // Listen for events
            pubnub.addListener({
                status: function(statusEvent) {
                    if (statusEvent.category === "PNConnectedCategory") {
                        // Announce entry to the room with metadata
                        publishAction('JOIN', { name: myName });
                    }
                },
                message: function(event) {
                    handleGameMessage(event.message);
                }
            });

            pubnub.subscribe({
                channels: [channelName]
            });

            // Switch Screen UX
            document.getElementById('options-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            document.getElementById('room-display').innerText = `Room: ${channelName} (${playerLimit} Max)`;
            
            // Build an initial blank local grid while waiting
            buildLocalUI();
        }

        // --- NETWORK MESSAGING MESSAGES ---
        function publishAction(type, data) {
            pubnub.publish({
                channel: channelName,
                message: { sender: myUUID, type: type, data: data }
            });
        }

        function handleGameMessage(msg) {
            switch(msg.type) {
                case 'JOIN':
                    // Add player if not already tracked and room not full
                    if (!players.find(p => p.uuid === msg.sender) && players.length < playerLimit) {
                        players.push({ uuid: msg.sender, name: msg.data.name });
                        updatePlayerListUI();
                        
                        // If I am the Host (first player), sync everyone else with our current state
                        if (players[0].uuid === myUUID) {
                            if (players.length === playerLimit && boardState.length === 0) {
                                startNewGame(); // Everyone has joined, generate board!
                            } else {
                                publishAction('SYNC_STATE', { players, boardState, currentPlayerIndex, gameOver });
                            }
                        }
                    }
                    break;

                case 'SYNC_STATE':
                    // Synchronizes late-joiners or aligns initial configurations
                    players = msg.data.players;
                    currentPlayerIndex = msg.data.currentPlayerIndex;
                    gameOver = msg.data.gameOver;
                    if(msg.data.boardState && msg.data.boardState.length > 0) {
                        boardState = msg.data.boardState;
                        renderBoard();
                    }
                    updatePlayerListUI();
                    checkTurnStatus();
                    break;

                case 'MOVE':
                    // A player processed a grid cell action
                    boardState = msg.data.boardState;
                    currentPlayerIndex = msg.data.nextPlayerIndex;
                    gameOver = msg.data.gameOver;
                    renderBoard();
                    updatePlayerListUI();
                    checkTurnStatus();
                    if(gameOver) handleGameOver(msg.data.result);
                    break;

                case 'PASS':
                    // Next turn triggered explicitly
                    currentPlayerIndex = msg.data.nextPlayerIndex;
                    updatePlayerListUI();
                    checkTurnStatus();
                    break;
            }
        }

        // --- MINESWEEPER LOGIC ---
        function startNewGame() {
            // Generate standard backend grid model
            boardState = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({ r, c, isMine: false, isRevealed: false, isFlagged: false, neighborMines: 0 });
                }
                boardState.push(row);
            }

            // Plant Mines randomly
            let planted = 0;
            while(planted < MINE_COUNT) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                if(!boardState[r][c].isMine) {
                    boardState[r][c].isMine = true;
                    planted++;
                }
            }

            // Calculate Neighbor Values
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (boardState[r][c].isMine) continue;
                    let count = 0;
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            if(boardState[r+i] && boardState[r+i][c+j] && boardState[r+i][c+j].isMine) count++;
                        }
                    }
                    boardState[r][c].neighborMines = count;
                }
            }

            gameOver = false;
            currentPlayerIndex = 0;
            
            // Send newly instantiated setup to everyone
            publishAction('SYNC_STATE', { players, boardState, currentPlayerIndex, gameOver });
        }

        function handleCellClick(r, c) {
            if (!isMyTurn || gameOver) return;
            
            let cell = boardState[r][c];
            if (cell.isRevealed) return;

            if (currentMode === 'FLAG') {
                cell.isFlagged = !cell.isFlagged;
            } else {
                // Dig Mode
                if (cell.isFlagged) return; // Guard flagged spots
                if (cell.isMine) {
                    // Detonation! Lose logic
                    cell.isRevealed = true;
                    gameOver = true;
                    publishAction('MOVE', { boardState, nextPlayerIndex: currentPlayerIndex, gameOver, result: 'LOSE' });
                    return;
                } else {
                    revealCellCascade(r, c);
                }
            }

            // Check if win condition met
            if (checkWinCondition()) {
                gameOver = true;
                publishAction('MOVE', { boardState, nextPlayerIndex: currentPlayerIndex, gameOver, result: 'WIN' });
                return;
            }

            // Move completed successfully, cycle turns
            let nextPlayerIndex = (currentPlayerIndex + 1) % players.length;
            publishAction('MOVE', { boardState, nextPlayerIndex, gameOver });
        }

        function revealCellCascade(r, c) {
            if (!boardState[r] || !boardState[r][c] || boardState[r][c].isRevealed || boardState[r][c].isMine) return;
            
            boardState[r][c].isRevealed = true;
            boardState[r][c].isFlagged = false; // clear flags on reveals

            if (boardState[r][c].neighborMines === 0) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        revealCellCascade(r + i, c + j);
                    }
                }
            }
        }

        function passTurn() {
            if (!isMyTurn || gameOver) return;
            let nextPlayerIndex = (currentPlayerIndex + 1) % players.length;
            publishAction('PASS', { nextPlayerIndex });
        }

        function checkWinCondition() {
            for(let r=0; r<ROWS; r++){
                for(let c=0; c<COLS; c++){
                    // If any non-mine cell remains unrevealed, game continues
                    if(!boardState[r][c].isMine && !boardState[r][c].isRevealed) return false;
                }
            }
            return true;
        }

        // --- UI DRAWING & updates ---
        function buildLocalUI() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cellEl = document.createElement('div');
                    cellEl.classList.add('cell');
                    cellEl.id = `cell-${r}-${c}`;
                    cellEl.addEventListener('click', () => handleCellClick(r, c));
                    gridDiv.appendChild(cellEl);
                }
            }
        }

        function renderBoard() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cellData = boardState[r][c];
                    let cellEl = document.getElementById(`cell-${r}-${c}`);
                    
                    // Reset styling classes
                    cellEl.className = 'cell';
                    cellEl.innerText = '';

                    if (cellData.isRevealed) {
                        cellEl.classList.add('revealed');
                        if (cellData.isMine) {
                            cellEl.classList.add('mine');
                            cellEl.innerText = '💣';
                        } else if (cellData.neighborMines > 0) {
                            cellEl.innerText = cellData.neighborMines;
                        }
                    } else if (cellData.isFlagged) {
                        cellEl.classList.add('flagged');
                        cellEl.innerText = '🚩';
                    }
                }
            }
        }

        function toggleMode() {
            const modeBtn = document.getElementById('mode-toggle');
            if (currentMode === 'DIG') {
                currentMode = 'FLAG';
                modeBtn.innerText = "Mode: FLAG";
                modeBtn.classList.add('flag-mode');
            } else {
                currentMode = 'DIG';
                modeBtn.innerText = "Mode: DIG";
                modeBtn.classList.remove('flag-mode');
            }
        }

        function checkTurnStatus() {
            const banner = document.getElementById('turn-banner');
            const passBtn = document.getElementById('pass-button');

            if (players.length < playerLimit) {
                banner.innerText = "Waiting for more players...";
                banner.className = "turn-indicator their-turn";
                passBtn.disabled = true;
                isMyTurn = false;
                return;
            }

            let currentTurnPlayer = players[currentPlayerIndex];
            
            if (currentTurnPlayer && currentTurnPlayer.uuid === myUUID) {
                isMyTurn = true;
                banner.innerText = "YOUR TURN! Dig, Flag, or Pass.";
                banner.className = "turn-indicator your-turn";
                passBtn.disabled = false;
            } else {
                isMyTurn = false;
                banner.innerText = `${currentTurnPlayer ? currentTurnPlayer.name : 'Someone'}'s Turn...`;
                banner.className = "turn-indicator their-turn";
                passBtn.disabled = true;
            }
        }

        function updatePlayerListUI() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach((p, idx) => {
                let li = document.createElement('li');
                li.innerText = `${p.name} ${p.uuid === myUUID ? '(You)' : ''}`;
                if(idx === currentPlayerIndex && players.length === playerLimit) {
                    li.classList.add('active-p');
                    li.innerText += " ➡️ Ready";
                }
                list.appendChild(li);
            });
        }

        function handleGameOver(result) {
            let currentTurnPlayer = players[currentPlayerIndex];
            if (result === 'LOSE') {
                alert(`💥 BOOM! ${currentTurnPlayer.name} hit a mine! Game Over.`);
            } else if (result === 'WIN') {
                alert(`🎉 Congratulations! The board has been cleared successfully!`);
            }
        }
    </script>
</body>
</html>
