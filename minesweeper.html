<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Pro: Tactical Grid Command</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pubnub@7.2.2/dist/web/pubnub.min.js" onerror="console.log('PubNub CDN offline')"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1 { font-size: 1.5rem; margin: 8px 0; color: #f1c40f; }
        
        .status { 
            background: #222; 
            padding: 14px; 
            border-radius: 8px; 
            margin: 10px auto; 
            font-weight: bold; 
            color: #00ffca; 
            max-width: 400px; 
            box-sizing: border-box; 
            border: 1px solid #333;
            font-size: 1.05rem;
        }
        
        .setup-card { background: #1a1a1a; padding: 25px; border-radius: 12px; max-width: 360px; margin: 20px auto; border: 1px solid #333; text-align: left; }
        .setup-card label { font-size: 0.9rem; color: #aaa; font-weight: bold; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select { background: #333; color: #fff; border: 1px solid #555; padding: 14px; border-radius: 6px; font-size: 1.1rem; width: 100%; text-align: center; margin: 6px 0 18px 0; box-sizing: border-box; }
        
        .mode-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .mode-online { background: #2ecc71; color: #fff; }

        .controls { display: flex; justify-content: space-between; max-width: 400px; margin: 8px auto; gap: 8px; }
        .sub-btn { background: #7f8c8d; padding: 12px; font-size: 0.9rem; flex: 1; border-radius: 4px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .grid-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; width: 100%; }
        .board-wrapper { width: 100%; max-width: 400px; }
        .board-title { font-size: 0.95rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: bold; }
        
        /* Minesweeper Fixed 10x10 Layout Grid */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; width: 100%; aspect-ratio: 1; margin: 0 auto; box-sizing: border-box; background: #151515; padding: 4px; border-radius: 6px; }
        
        .cell { background: #262626; aspect-ratio: 1; border-radius: 3px; border: 1px solid #111; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; user-select: none; }
        .cell.revealed { background: #ecf0f1; border: 1px solid #bdc3c7; color: #2c3e50; }
        .cell.mine { background: #e74c3c !important; border: 1px solid #c0392b; }
        .cell.flagged { background: #f1c40f; border: 1px solid #d4ac0d; }
        
        /* Cell number label text colorings */
        .cell[data-count="1"] { color: #2980b9; }
        .cell[data-count="2"] { color: #27ae60; }
        .cell[data-count="3"] { color: #e74c3c; }
        .cell[data-count="4"] { color: #8e44ad; }
        .cell[data-count="5"] { color: #d35400; }

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; background: #111; border-radius: 6px; overflow: hidden; font-size: 0.85rem; }
        .stats-table th { background: #2c3e50; color: #fff; padding: 8px; font-weight: bold; text-align: left; }
        .stats-table td { padding: 8px; border-bottom: 1px solid #222; text-align: left; color: #ccc; }

        .main-btn { background: #3498db; color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; box-sizing: border-box; margin-top: 10px; text-transform: uppercase; }
        .main-btn:disabled { background: #333; color: #666; cursor: not-allowed; border: 1px dashed #444; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #1a1a1a; border: 2px solid #3498db; border-radius: 12px; max-width: 440px; width: 100%; padding: 22px; box-sizing: border-box; text-align: center; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>Minesweeper Pro: Multi-Ops Edition V2</h1>
    <div id="status-box" class="status">Initializing Tactical Network Layer...</div>

    <div id="game-modal" class="modal-overlay hidden">
        <div id="modal-card" class="modal-content">
            <h3 id="modal-title">Alert</h3>
            <div id="modal-body">Message contents...</div>
            <button class="main-btn" style="margin-top:15px; padding:12px;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="lobby-screen" class="hidden">
        <div class="setup-card" style="text-align: center;">
            <div id="net-badge" class="mode-badge mode-online">ONLINE FIELD NODE ACTIVE</div>
            
            <div style="text-align: left;">
                <label for="name-input">Your Name Tag</label>
                <input type="text" id="name-input" placeholder="e.g. Sweeper_Alpha" maxlength="12">
            </div>

            <div style="text-align: left;">
                <label for="player-limit-input">Max Player Allocation Limit</label>
                <select id="player-limit-input">
                    <option value="2">2 Players Max</option>
                    <option value="3">3 Players Max</option>
                    <option value="4">4 Players Max</option>
                </select>
            </div>

            <div id="online-controls">
                <div style="text-align: left;">
                    <label for="room-input">Tactical Channel Code</label>
                    <input type="number" id="room-input" pattern="[0-9]*" placeholder="e.g. 5566">
                </div>
                <button class="main-btn" id="btn-start-online">Join Sweep Operation</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="controls" id="gameplay-controls-panel">
            <button class="sub-btn" id="btn-mode" style="background:#8e44ad;">Mode: DIGGING</button>
            <button class="sub-btn" id="btn-pass" style="background: #e67e22;">Pass Turn</button>
        </div>

        <div class="grid-container">
            <div class="board-wrapper">
                <div class="board-title" id="board-header">Minefield Command Operations</div>
                <div id="minefield-board" class="grid"></div>
            </div>
            
            <div class="board-wrapper hidden" id="game-over-container">
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; margin-bottom:10px;">
                    <h4 style="margin:0 0 10px 0; color:#f1c40f;">OPERATION COMPLETED</h4>
                    <button class="main-btn" style="background: #2ecc71; margin-top:0;" id="btn-exit-lobby">Return to Main Lobby</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- GAME ENGINE AND NETWORK STATE CONTEXTS ---
        const statusBox = document.getElementById('status-box');
        let pubnub, myChannel, myName;
        let myId = "u_" + Math.random().toString(36).substring(2, 6);
        
        let globalPlayers = {}; 
        let activeTurnOrder = []; 
        let currentTurnUserId = null;
        let maxPlayersAllowed = 2;
        let matchIsActive = false;

        // Scoring metrics tracked across sweeps
        let statCellsCleared = 0;
        let statFlagsPlaced = 0;

        // Core Minefield Matrix Constants
        const GRID_SIZE = 100; // 10x10 Matrix Array
        const MINE_COUNT = 15;
        let minefieldBlueprint = []; // Shared layout data maps: { isMine: bool, isRevealed: bool, isFlagged: bool, count: int }
        let currentToolMode = "DIG"; // Alternative Option: "FLAG"

        // --- DIALOG MODAL LAYOUT HANDLERS ---
        function showModal(title, htmlContent) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = htmlContent;
            document.getElementById('game-modal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('game-modal').classList.add('hidden');
        }

        // --- NETWORK STARTUP ---
        window.addEventListener('load', () => {
            if (typeof PubNub === 'undefined') {
                statusBox.innerText = "Error: Network layer dependencies unavailable.";
            } else {
                statusBox.innerText = "Connected to global operations mesh.";
                document.getElementById('lobby-screen').classList.remove('hidden');
            }
        });

        function broadcastPayloadNetworkMessage(msg) {
            if (pubnub) {
                pubnub.publish({ channel: myChannel, message: msg });
            }
        }

        // --- ONLINE MESH NETWORKING LAYOUTS ---
        document.getElementById('btn-start-online').addEventListener('click', () => {
            myName = document.getElementById('name-input').value.trim() || "Sweeper_" + Math.floor(Math.random()*90+10);
            maxPlayersAllowed = parseInt(document.getElementById('player-limit-input').value);
            const roomCode = document.getElementById('room-input').value.trim();
            if (!roomCode) return alert("An operations channel code is required.");
            
            myChannel = 'msweep_v1_room_' + roomCode;
            pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', userId: myId });
            setupPubNubChannelSubscription();
        });

        function setupPubNubChannelSubscription() {
            globalPlayers[myId] = { name: myName, ready: false, score: 0 };

            pubnub.addListener({
                message: function(event) { handleInboundUnifiedMessage(event.message); }
            });
            pubnub.subscribe({ channels: [myChannel] });
            
            // Broadcast deployment identity to open operations nodes
            broadcastPayloadNetworkMessage({ type: 'sync-identity', name: globalPlayers[myId].name, limit: maxPlayersAllowed, sender: myId });
            
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            statusBox.innerText = "Awaiting deployment connections...";
            
            initMinefieldMemoryStructures();
            renderBlankFieldGrid();
        }

        // --- INBOUND SYSTEM NETWORK MESSAGE ROUTINES ---
        function handleInboundUnifiedMessage(data) {
            if (data.type === 'sync-identity') {
                // Connection enforcement cap matching options configuration
                if (Object.keys(globalPlayers).length >= data.limit || matchIsActive) {
                    if (data.sender === myId) {
                        handleRoomLockedKickback();
                    } else {
                        broadcastPayloadNetworkMessage({ type: 'room-locked-rejection', targetUser: data.sender });
                    }
                    return;
                }
                if (!globalPlayers[data.sender]) {
                    globalPlayers[data.sender] = { name: data.name, ready: false, score: 0 };
                }
                maxPlayersAllowed = data.limit;
                broadcastPayloadNetworkMessage({ type: 'ack-identity', name: globalPlayers[myId].name, sender: myId });
                evaluateAutomaticOperationStart();
            }
            else if (data.type === 'room-locked-rejection') {
                if (data.targetUser === myId) {
                    handleRoomLockedKickback();
                }
            }
            else if (data.type === 'ack-identity') {
                if (!globalPlayers[data.sender]) {
                    globalPlayers[data.sender] = { name: data.name, ready: false, score: 0 };
                }
                evaluateAutomaticOperationStart();
            }
            else if (data.type === 'ghost-sync-payload') {
                // Received direct operational map coordinates array from the host machine node
                minefieldBlueprint = data.fieldMap;
                activeTurnOrder = data.order;
                currentTurnUserId = activeTurnOrder[0];
                matchIsActive = true;
                
                updateVisualDisplays();
                updateTurnHeader();
            }
            else if (data.type === 'field-update-action') {
                minefieldBlueprint = data.fieldMap;
                currentTurnUserId = data.nextUserId;
                globalPlayers[data.actorId].score = data.actorUpdatedScore;
                
                updateVisualDisplays();
                updateTurnHeader();
            }
            else if (data.type === 'pass-turn-action') {
                currentTurnUserId = data.nextUserId;
                updateTurnHeader();
            }
            else if (data.type === 'broadcast-global-match-over') {
                handleGlobalMatchOverBroadcast(data.outcome, data.triggerPlayerName, data.finalMetricsMatrix);
            }
        }

        function handleRoomLockedKickback() {
            if(pubnub) pubnub.unsubscribe({ channels: [myChannel] });
            showModal("SECTOR CLOSED", "<p>This grid operation is full or currently active in scanning.</p>");
            statusBox.innerText = "Error: Channel Locked.";
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }

        // --- HOSTER INITIATED GRID MAP GENERATOR ---
        function evaluateAutomaticOperationStart() {
            let connectedIds = Object.keys(globalPlayers);
            if (connectedIds.length === maxPlayersAllowed) {
                let sortedIds = [...connectedIds].sort();
                
                // Host player node compiles structural seed to balance coordinates array layout
                if (myId === sortedIds[0] && !matchIsActive) {
                    generateHostFieldBlueprint();
                    let shuffleTurnOrder = [...connectedIds].sort(() => Math.random() - 0.5);
                    
                    broadcastPayloadNetworkMessage({ 
                        type: 'ghost-sync-payload', 
                        fieldMap: minefieldBlueprint, 
                        order: shuffleTurnOrder, 
                        sender: myId 
                    });
                }
            } else {
                statusBox.innerText = `Waiting for players (${connectedIds.length}/${maxPlayersAllowed})...`;
            }
        }

        function generateHostFieldBlueprint() {
            initMinefieldMemoryStructures();
            
            // Randomly plant strategic points
            let planted = 0;
            while (planted < MINE_COUNT) {
                let randIndex = Math.floor(Math.random() * GRID_SIZE);
                if (!minefieldBlueprint[randIndex].isMine) {
                    minefieldBlueprint[randIndex].isMine = true;
                    planted++;
                }
            }

            // Calculate adjacent numerical metrics parameters
            for (let i = 0; i < GRID_SIZE; i++) {
                if (minefieldBlueprint[i].isMine) continue;
                minefieldBlueprint[i].count = calculateNeighboringMinesCount(i);
            }
        }

        function calculateNeighboringMinesCount(index) {
            let count = 0;
            let row = Math.floor(index / 10);
            let col = index % 10;

            for (let rOffset = -1; rOffset <= 1; rOffset++) {
                for (let cOffset = -1; cOffset <= 1; cOffset++) {
                    let targetRow = row + rOffset;
                    let targetCol = col + cOffset;
                    
                    if (targetRow >= 0 && targetRow < 10 && targetCol >= 0 && targetCol < 10) {
                        let targetIdx = targetRow * 10 + targetCol;
                        if (minefieldBlueprint[targetIdx].isMine) count++;
                    }
                }
            }
            return count;
        }

        function initMinefieldMemoryStructures() {
            minefieldBlueprint = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                minefieldBlueprint.push({ isMine: false, isRevealed: false, isFlagged: false, count: 0 });
            }
            statCellsCleared = 0;
            statFlagsPlaced = 0;
            for (let p in globalPlayers) { globalPlayers[p].score = 0; }
        }

        // --- GRID RENDERING HANDLERS ---
        function renderBlankFieldGrid() {
            const container = document.getElementById('minefield-board');
            container.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', () => handleGridCellInteractionClick(i));
                container.appendChild(cell);
            }
        }

        function updateVisualDisplays() {
            const cells = document.querySelectorAll('#minefield-board .cell');
            cells.forEach((cell, i) => {
                const data = minefieldBlueprint[i];
                cell.className = 'cell';
                cell.innerText = '';
                cell.removeAttribute('data-count');

                if (data.isRevealed) {
                    cell.classList.add('revealed');
                    if (data.isMine) {
                        cell.classList.add('mine');
                        cell.innerText = '💣';
                    } else if (data.count > 0) {
                        cell.innerText = data.count;
                        cell.setAttribute('data-count', data.count);
                    }
                } else if (data.isFlagged) {
                    cell.classList.add('flagged');
                    cell.innerText = '🚩';
                }
            });
        }

        // --- INTERACTION AND GAMEPLAY RULES METRICS LOOP ---
        function handleGridCellInteractionClick(index) {
            if (!matchIsActive || currentTurnUserId !== myId) return;
            
            let cell = minefieldBlueprint[index];
            if (cell.isRevealed) return; // Ignore already processed nodes

            if (currentToolMode === "FLAG") {
                cell.isFlagged = !cell.isFlagged;
                if(cell.isFlagged) statFlagsPlaced++;
                advanceTurnSequenceState();
            } else {
                // Digging Execution Process Mode
                if (cell.isFlagged) return; // Prevent clicking safe grids accidentally
                
                if (cell.isMine) {
                    // Detonation path executed
                    cell.isRevealed = true;
                    handleExplosionDefeatCondition();
                } else {
                    // Safe sweep execution
                    executeCascadeReveal(index);
                    checkVictoryEnforcementStandard();
                }
            }
        }

        function executeCascadeReveal(index) {
            let row = Math.floor(index / 10);
            let col = index % 10;

            if (row < 0 || row >= 10 || col < 0 || col >= 10) return;
            let cell = minefieldBlueprint[index];
            if (cell.isRevealed || cell.isMine) return;

            cell.isRevealed = true;
            cell.isFlagged = false; // Remove flag tracking overlay
            statCellsCleared++;
            globalPlayers[myId].score += 10; // Award progression units per node cleared

            if (cell.count === 0) {
                for (let rOffset = -1; rOffset <= 1; rOffset++) {
                    for (let cOffset = -1; cOffset <= 1; cOffset++) {
                        let targetRow = row + rOffset;
                        let targetCol = col + cOffset;
                        if (targetRow >= 0 && targetRow < 10 && targetCol >= 0 && targetCol < 10) {
                            executeCascadeReveal(targetRow * 10 + targetCol);
                        }
                    }
                }
            }
        }

        // --- BUTTON UTILITY TOGGLES ---
        document.getElementById('btn-mode').addEventListener('click', () => {
            const btn = document.getElementById('btn-mode');
            if (currentToolMode === "DIG") {
                currentToolMode = "FLAG";
                btn.innerText = "Mode: FLAGGING";
                btn.style.background = "#e74c3c";
            } else {
                currentToolMode = "DIG";
                btn.innerText = "Mode: DIGGING";
                btn.style.background = "#8e44ad";
            }
        });

        document.getElementById('btn-pass').addEventListener('click', () => {
            if (!matchIsActive || currentTurnUserId !== myId) return;
            
            // Push luck option sequence loop passing direct execution token
            let nextIndex = (activeTurnOrder.indexOf(myId) + 1) % activeTurnOrder.length;
            let nextUserId = activeTurnOrder[nextIndex];
            
            broadcastPayloadNetworkMessage({
                type: 'pass-turn-action',
                nextUserId: nextUserId,
                sender: myId
            });
        });

        function advanceTurnSequenceState() {
            let nextIndex = (activeTurnOrder.indexOf(myId) + 1) % activeTurnOrder.length;
            let nextUserId = activeTurnOrder[nextIndex];

            broadcastPayloadNetworkMessage({
                type: 'field-update-action',
                fieldMap: minefieldBlueprint,
                nextUserId: nextUserId,
                actorId: myId,
                actorUpdatedScore: globalPlayers[myId].score,
                sender: myId
            });
        }

        function updateTurnHeader() {
            const header = document.getElementById('board-header');
            if (currentTurnUserId === myId) {
                statusBox.style.color = "#00ffca";
                statusBox.innerText = "Your Turn! Clear or Flag.";
                header.innerText = "YOUR GRID SCREEN FOCUS (ACTIVE)";
                header.style.color = "#00ffca";
                document.getElementById('gameplay-controls-panel').classList.remove('hidden');
            } else {
                let currentTurnName = globalPlayers[currentTurnUserId] ? globalPlayers[currentTurnUserId].name : "Operator";
                statusBox.style.color = "#ffb300";
                statusBox.innerText = `Awaiting sweep telemetry from ${currentTurnName}...`;
                header.innerText = `OBSERVING GRID FIELD FOR: ${currentTurnName.toUpperCase()}`;
                header.style.color = "#7f8c8d";
                document.getElementById('gameplay-controls-panel').classList.add('hidden');
            }
        }

        // --- EVALUATE RESOLUTIONS AND MATCH TERMINATIONS ---
        function handleExplosionDefeatCondition() {
            matchIsActive = false;
            let finalMetricsMatrix = compileFinalMetricsSummary();
            
            broadcastPayloadNetworkMessage({
                type: 'broadcast-global-match-over',
                outcome: 'DEFEAT',
                triggerPlayerName: globalPlayers[myId].name,
                finalMetricsMatrix: finalMetricsMatrix,
                sender: myId
            });
        }

        function checkVictoryEnforcementStandard() {
            let winMatch = true;
            for (let i = 0; i < GRID_SIZE; i++) {
                if (!minefieldBlueprint[i].isMine && !minefieldBlueprint[i].isRevealed) {
                    winMatch = false;
                    break;
                }
            }

            if (winMatch) {
                matchIsActive = false;
                let finalMetricsMatrix = compileFinalMetricsSummary();
                
                broadcastPayloadNetworkMessage({
                    type: 'broadcast-global-match-over',
                    outcome: 'VICTORY',
                    triggerPlayerName: globalPlayers[myId].name,
                    finalMetricsMatrix: finalMetricsMatrix,
                    sender: myId
                });
            } else {
                // No explosion and blocks remain: cycle turn safely
                advanceTurnSequenceState();
            }
        }

        function compileFinalMetricsSummary() {
            return Object.keys(globalPlayers).map(pId => {
                return {
                    name: globalPlayers[pId].name,
                    score: globalPlayers[pId].score,
                    isWinner: false
                };
            });
        }

        function handleGlobalMatchOverBroadcast(outcome, triggerName, analyticsData) {
            matchIsActive = false;
            statusBox.style.color = (outcome === 'VICTORY') ? "#2ecc71" : "#ff3838";
            statusBox.innerText = `OPERATION RESOLVED: ${outcome}`;

            document.getElementById('gameplay-controls-panel').classList.add('hidden');
            document.getElementById('game-over-container').classList.remove('hidden');

            // Force rendering visibility revealing location map arrays
            minefieldBlueprint.forEach(cell => { if(cell.isMine) cell.isRevealed = true; });
            updateVisualDisplays();

            let title = outcome === 'VICTORY' ? "GRID SECURED" : "TACTICAL DETONATION";
            let messageHtml = outcome === 'VICTORY' 
                ? `<p style="color:#2ecc71; font-weight:bold;">Success! ${triggerName} cleared the last remaining safe cell.</p>`
                : `<p style="color:#ff3838; font-weight:bold;">Boom! ${triggerName} triggered a live pressure contact point.</p>`;

            // Display ranked score board
            messageHtml += `<h4>Tactical Operations Metric Matrix:</h4>`;
            messageHtml += `<table class="stats-table"><tr><th>Operator Node</th><th>Points Record</th></tr>`;
            
            // Sort leaderboard ranking array descending
            analyticsData.sort((a,b) => b.score - a.score);
            analyticsData.forEach(r => {
                messageHtml += `<tr><td>${r.name}</td><td>${r.score} PTS</td></tr>`;
            });
            messageHtml += "</table>";

            showModal(title, messageHtml);
        }

        // --- REBOOT TEARDOWN SYSTEM ROUTINES ---
        document.getElementById('btn-exit-lobby').addEventListener('click', () => {
            if (pubnub) pubnub.unsubscribe({ channels: [myChannel] });
            globalPlayers = {}; activeTurnOrder = []; currentTurnUserId = null; matchIsActive = false;
            initMinefieldMemoryStructures();
            
            document.getElementById('game-over-container').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            
            statusBox.className = "status";
            statusBox.style.color = "#00ffca";
            statusBox.innerText = "Connected to global operations mesh.";
        });
    </script>
</body>
</html>
