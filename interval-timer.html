<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interval Timer Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.2s ease;
            overflow: hidden; /* Prevent body scroll, handle in container */
        }

        @keyframes pulse-red {
            0% { background-color: #f4f4f4; }
            50% { background-color: #ffd1d1; }
            100% { background-color: #f4f4f4; }
        }
        .pulsing { animation: pulse-red 1s infinite; }

        .container {
            position: relative;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 340px;
            max-height: 90vh;
            overflow-y: auto; /* Allow scrolling inside the card */
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
        }

        /* Fullscreen Button */
        .btn-fullscreen {
            position: absolute;
            top: 5px; right: 5px; 
            width: 44px; height: 44px; /* Larger touch target */
            padding: 0; margin: 0;
            background: transparent; color: #ccc; 
            font-size: 24px; line-height: 44px;
            cursor: pointer; border: none; outline: none; 
            -webkit-tap-highlight-color: transparent;
            z-index: 100;
        }
        .btn-fullscreen:hover { color: #333; }

        /* Stack Styles */
        .exercise-stack {
            position: relative;
            background: #f9f9f9;
            border-radius: 10px;
            height: 140px; 
            margin-bottom: 20px;
            overflow: hidden; 
            border: 1px solid #eee;
        }

        .stack-item {
            position: absolute;
            width: 100%;
            height: 40px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, top, opacity, color; 
            left: 0;
        }

        .pos-hidden-top { top: -30px; opacity: 0; transform: scale(0.66); color: #aaa; }
        .pos-prev { top: 15px; opacity: 0.5; color: #aaa; transform: scale(0.66); }
        .pos-curr { 
            top: 50px; opacity: 1; color: #28a745; 
            transform: scale(1.2); font-size: 18px; 
            z-index: 10; text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .pos-next { top: 85px; opacity: 0.5; color: #aaa; transform: scale(0.66); }
        .pos-hidden-bot { top: 130px; opacity: 0; transform: scale(0.66); color: #aaa; }
        .no-transition { transition: none !important; }

        @media (min-width: 600px) and (orientation: landscape) {
            .container { max-width: 700px; padding: 1rem; }
            .timer-layout { display: flex; flex-direction: row; gap: 40px; margin-bottom: 20px; align-items: center;}
            .exercise-stack { flex: 1; margin-bottom: 0 !important; height: 180px; }
            .pos-prev { top: 25px; } .pos-curr { top: 70px; } .pos-next { top: 115px; } .pos-hidden-bot { top: 160px; }
            .timer-area { flex: 1; }
        }

        .stats-bar { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-size: 14px; color: #666; font-weight: bold; display: flex; justify-content: space-between; margin-top: 15px;}
        .stats-highlight { color: #007BFF; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; font-family: inherit; }
        textarea { resize: vertical; height: 80px; }
        .hint { font-size: 12px; color: #777; margin-top: 2px; display: block; }

        button { border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; transition: background 0.2s; color: white; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background-color: #007BFF; } .btn-primary:hover { background-color: #0056b3; }
        .btn-danger { background-color: #dc3545; margin-top: 15px; } .btn-danger:hover { background-color: #a71d2a; }
        .btn-success { background-color: #28a745; font-weight: bold; font-size: 18px; padding: 15px; } .btn-success:hover { background-color: #218838; }

        .btn-control-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-control-row button { margin-top: 0; height: 50px; }
        .btn-main-action { background-color: #28a745; color: white; font-weight: bold; flex-basis: 65%; } .btn-main-action:hover { background-color: #218838; }
        .btn-color-pause { background-color: #ffc107; color: #333; flex-basis: 65%; } .btn-color-pause:hover { background-color: #e0a800; }
        .btn-stop-small { background-color: #6c757d; flex-basis: 35%; }

        #timer-screen { display: none; }
        .status-label { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .timer-display { font-size: 80px; font-weight: bold; color: #333; line-height: 1; margin: 10px 0; }
        .sets-display { font-size: 16px; color: #666; margin-bottom: 20px; }
        .work-mode { color: #28a745; } .rest-mode { color: #ffc107; } .finished-mode { color: #007BFF; }
        #completion-options { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-fullscreen" onclick="safeToggleFullScreen()" title="Full Screen">⤢</button>

        <div id="setup-screen">
            <h2>Setup Workout</h2>
            <div class="input-group">
                <label>Number of Intervals per Set</label>
                <input type="number" id="numIntervals" value="5" min="1">
            </div>
            <div class="input-group">
                <label>Work Duration (seconds)</label>
                <input type="number" id="workDuration" value="30" min="1">
            </div>
            <div class="input-group">
                <label>Rest Duration (seconds)</label>
                <input type="number" id="restDuration" value="10" min="0">
            </div>
            <div class="input-group">
                <label>Exercise Names (Optional)</label>
                <span class="hint">Separate with commas or new lines.</span>
                <textarea id="exerciseNames" placeholder="Pushups, Situps, Squats..."></textarea>
            </div>
            <button class="btn-primary" onclick="setupReadyScreen()">Start Workout</button>
        </div>

        <div id="timer-screen">
            <div class="stats-bar">
                <span>Total Sets Completed:</span>
                <span id="total-sets-count" class="stats-highlight">0</span>
            </div>

            <div class="timer-layout">
                <div class="exercise-stack">
                    <div id="slot-1" class="stack-item pos-prev">-</div>
                    <div id="slot-2" class="stack-item pos-curr">Interval 1</div>
                    <div id="slot-3" class="stack-item pos-next">Interval 2</div>
                    <div id="slot-4" class="stack-item pos-hidden-bot">Buffer</div>
                </div>

                <div class="timer-area">
                    <div id="status-label" class="status-label">Get Ready</div>
                    <div id="time-display" class="timer-display">00</div>
                    <div id="sets-display" class="sets-display">Interval 1 / 5</div>
                </div>
            </div>
            
            <div id="active-controls" class="btn-control-row">
                <button id="main-btn" class="btn-main-action" onclick="handleMainButton()">Start</button>
                <button class="btn-stop-small" onclick="resetToMenu()">Stop</button>
            </div>

            <div id="completion-options">
                <button class="btn-success" onclick="setupReadyScreen()">Start Next Set</button>
                <button class="btn-danger" onclick="resetToMenu()">New Workout</button>
            </div>
        </div>
    </div>

    <script>
        // --- SAFE AUDIO SYSTEM ---
        let audioCtx = null;

        function safeInitAudio() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        audioCtx = new AudioContext();
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.log("Audio init failed, continuing without sound.");
            }
        }

        function playBeep(type) {
            try {
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const vol = 0.5;

                if (type === 'work') { osc.frequency.value = 880; gain.gain.value = vol; osc.type = 'sine'; }
                else if (type === 'rest') { osc.frequency.value = 440; gain.gain.value = vol; osc.type = 'sine'; }
                else if (type === 'warning') { 
                    osc.frequency.value = 600; gain.gain.value = 0.3; osc.type = 'triangle';
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1); return; 
                }
                else { 
                    osc.frequency.value = 500; gain.gain.value = vol; osc.type = 'square';
                    osc.start(); osc.stop(audioCtx.currentTime + 1.0); return; 
                }
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {
                console.log("Audio play failed");
            }
        }

        // --- SAFE FULLSCREEN TOGGLE ---
        function safeToggleFullScreen() {
            try {
                const doc = window.document;
                const docEl = doc.documentElement;
                const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
                const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
                const isFullScreen = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement;

                if (!isFullScreen) { if(requestFullScreen) requestFullScreen.call(docEl); } 
                else { if(cancelFullScreen) cancelFullScreen.call(doc); }
            } catch(e) {
                console.log("Fullscreen not supported");
            }
        }

        // --- APP LOGIC ---
        let timerInterval;
        let totalIntervals;
        let workTime, restTime;
        let currentInterval = 1;
        let setsCompleted = 0;
        let currentTime = 0;
        let isWorking = true; 
        let isPaused = false;
        let isPreStart = true;
        let isCountdown = false;
        let exercises = [];
        let slotOrder = ['slot-1', 'slot-2', 'slot-3', 'slot-4'];

        function parseExerciseNames(inputStr, count) {
            let names = inputStr.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
            if (names.length === 0) {
                for (let i = 1; i <= count; i++) names.push(`Interval ${i}`);
                return names;
            }
            const result = [];
            for (let i = 0; i < count; i++) result.push(names[i % names.length]);
            return result;
        }

        function updateStack(animate = true) {
            // FIXED LOGIC: Calculate buffer based on future state
            let valBuffer;
            
            // Note: We calculate the item that will appear at the bottom *next* time.
            // If currently working (showing Work), next is Rest. After Rest comes Work+1.
            // If currently resting (showing Rest), next is Work+1. After Work+1 comes Rest.
            
            if (isWorking) {
                // Current: Work. Next: Rest. Buffer: Work+1
                if (currentInterval >= totalIntervals) valBuffer = ""; 
                else valBuffer = exercises[currentInterval]; 
            } else {
                // Current: Rest. Next: Work+1. Buffer: Rest (or Finish)
                if (currentInterval + 1 >= totalIntervals && isWorking) valBuffer = "Finish Set";
                else valBuffer = "REST";
            }

            if (!animate) {
                slotOrder = ['slot-1', 'slot-2', 'slot-3', 'slot-4'];
                document.getElementById(slotOrder[0]).innerText = "-";
                document.getElementById(slotOrder[1]).innerText = exercises[0];
                document.getElementById(slotOrder[2]).innerText = "REST";
                document.getElementById(slotOrder[3]).innerText = exercises[1] || "";
                assignClass(slotOrder[0], 'pos-prev');
                assignClass(slotOrder[1], 'pos-curr');
                assignClass(slotOrder[2], 'pos-next');
                assignClass(slotOrder[3], 'pos-hidden-bot');
                return;
            }

            // 1. Shift positions visually
            assignClass(slotOrder[0], 'pos-hidden-top'); 
            assignClass(slotOrder[1], 'pos-prev');       
            assignClass(slotOrder[2], 'pos-curr');       
            assignClass(slotOrder[3], 'pos-next');       

            // 2. Recycle item
            const recycledItem = slotOrder.shift(); 
            slotOrder.push(recycledItem); 

            // 3. Update Text of recycled item (which is now hidden at bottom)
            document.getElementById(recycledItem).innerText = valBuffer;

            // 4. Snap back to bottom position instantly
            setTimeout(() => {
                const el = document.getElementById(recycledItem);
                el.classList.add('no-transition');
                el.className = 'stack-item pos-hidden-bot no-transition';
                void el.offsetWidth; 
                el.classList.remove('no-transition');
            }, 500);
        }

        function assignClass(id, className) {
            const el = document.getElementById(id);
            if(el) el.className = `stack-item ${className}`;
        }

        function setupReadyScreen() {
            safeInitAudio(); // Try to init, but don't block if fail

            totalIntervals = parseInt(document.getElementById('numIntervals').value) || 5;
            workTime = parseInt(document.getElementById('workDuration').value) || 30;
            restTime = parseInt(document.getElementById('restDuration').value) || 10;
            exercises = parseExerciseNames(document.getElementById('exerciseNames').value, totalIntervals);

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('timer-screen').style.display = 'block';
            document.getElementById('completion-options').style.display = 'none';
            document.getElementById('active-controls').style.display = 'flex';

            currentInterval = 1;
            isWorking = true;
            isPaused = false;
            isPreStart = true;
            isCountdown = false;
            currentTime = 5; 

            updateStack(false); 
            document.getElementById('sets-display').innerText = `Interval 1 / ${totalIntervals}`;
            document.getElementById('status-label').innerText = "Get Ready";
            document.getElementById('status-label').className = "status-label"; 
            
            updateTimeDisplay();
            updateMainButton();
        }

        function handleMainButton() {
            safeInitAudio();

            if (isPreStart) {
                isPreStart = false;
                isCountdown = true;
                updateMainButton(); 
                runTimer();
            } else {
                isPaused = !isPaused;
                updateMainButton();
                if (isPaused) document.body.classList.remove('pulsing');
            }
        }

        function updateMainButton() {
            const btn = document.getElementById('main-btn');
            btn.classList.remove('btn-main-action', 'btn-color-pause');

            if (isPreStart) {
                btn.innerText = "Start";
                btn.classList.add('btn-main-action');
            } else if (isPaused) {
                btn.innerText = "Resume";
                btn.classList.add('btn-main-action');
            } else {
                btn.innerText = "Pause";
                btn.classList.add('btn-color-pause');
            }
        }

        function runTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPaused) return;

                currentTime--;
                updateTimeDisplay();

                if (isCountdown) {
                    document.body.classList.add('pulsing');
                    if (currentTime > 0) playBeep('warning');
                    
                    if (currentTime < 0) {
                        isCountdown = false;
                        document.body.classList.remove('pulsing');
                        startFirstInterval();
                    }
                } else {
                    if (currentTime < 0) {
                        switchPhase();
                    } else {
                        if (currentTime <= 5 && currentTime > 0) {
                            document.body.classList.add('pulsing');
                            playBeep('warning');
                        } else {
                            document.body.classList.remove('pulsing');
                        }
                    }
                }
            }, 1000);
        }

        function startFirstInterval() {
            isWorking = true;
            currentTime = workTime;
            const statusLabel = document.getElementById('status-label');
            statusLabel.innerText = "WORK";
            statusLabel.className = "status-label work-mode";
            playBeep('work');
            updateTimeDisplay();
        }

        function switchPhase() {
            document.body.classList.remove('pulsing');

            if (isWorking) {
                if (currentInterval === totalIntervals) { finishSet(); return; }
                isWorking = false;
                currentTime = restTime;
                
                const statusLabel = document.getElementById('status-label');
                statusLabel.innerText = "REST";
                statusLabel.className = "status-label rest-mode";
                
                playBeep('rest');
                updateStack(true); 
                updateTimeDisplay();
            } else {
                isWorking = true;
                currentInterval++;
                currentTime = workTime;
                
                const statusLabel = document.getElementById('status-label');
                statusLabel.innerText = "WORK";
                statusLabel.className = "status-label work-mode";
                
                document.getElementById('sets-display').innerText = `Interva
