<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M41A Tactical Motion Tracker</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.1.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
        #game-container {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
        }
        #radarCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn {
            background-color: #00ff66;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,102,0.4);
        }
        .btn-alt {
            background-color: #002208;
            color: #00ff66;
            border: 1px solid #00ff66;
        }
        /* Optional CRT Scanlines Layer */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        .scanlines.active {
            display: block;
        }
        #controls-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <h2>M41A SENSOR LINKUP</h2>
        <button class="btn" onclick="initTracking('marine')">Deploy Marine</button>
        <button class="btn btn-alt" onclick="initTracking('alien')">Deploy Alien</button>
    </div>

    <!-- MAIN INTERFACE CONTAINER -->
    <div id="game-container">
        <div id="controls-overlay">
            <button class="btn btn-alt" style="padding: 8px 15px; font-size: 12px;" onclick="toggleScanlines()">Toggle Scanlines</button>
        </div>
        <div id="scanline-layer" class="scanlines"></div>
        <canvas id="radarCanvas"></canvas>
    </div>

<script>
// --- CONFIGURATION ---
const PUBNUB_PUB_KEY = 'pub-c-d0d3df8c-4589-4f34-a4f9-f8e19afe8a33'; 
const PUBNUB_SUB_KEY = 'sub-c-577de050-aa10-49d2-911f-b246fb6a450f';
const GAME_CHANNEL = 'aliens-sensor-fusion';
const TARGET_FREQ = 19000; 

// --- GAME STATE ---
let role = ''; 
let pubnub;
let myId = 'p_' + Math.floor(Math.random() * 10000);
let myCoords = null;
let compassHeading = 0; 
let globalPlayers = {};

// Audio Channels
let audioCtx = null;
let micStream = null;
let fftAnalyser = null;
let ultrasonicOscillator = null;
let soundBlipBuffer = null; 
let soundHitBuffer = null;  

// UI Textures
let imgMotion = new Image();
let imgEdgeLeft = new Image();
let imgEdgeRight = new Image();
let assetsLoadedCount = 0;
const TOTAL_ASSETS = 3;

// Display Management
let canvas, ctx;
let sweepAngle = 0;
let nearestTrackingDistance = Infinity;
let currentUsVolume = 0;

// Pre-load visual graphics from your assets folders
imgMotion.src = 'assets/gfx/motion.png';
imgEdgeLeft.src = 'assets/gfx/edge.png';
imgEdgeRight.src = 'assets/gfx/edge_right.png';

// --- STEP 1: INITIALIZATION ---
async function initTracking(selectedRole) {
    role = selectedRole;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    
    canvas = document.getElementById('radarCanvas');
    ctx = canvas.getContext('2d');
    
    // Automatically scale canvas context sizes to device resolution
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    if ('wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }

    if (role === 'marine') {
        await loadAudioAssets();
        await startUltrasoundReception();
    } else {
        startUltrasoundEmission();
    }

    // Capture Orientation (Compass Heading)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                window.addEventListener('deviceorientation', handleCompass, true);
            }
        } catch (err) {}
    } else {
        window.addEventListener('deviceorientationabsolute', handleCompass, true);
        window.addEventListener('deviceorientation', handleCompass, true);
    }

    // PubNub Signaling
    pubnub = new PubNub({ publishKey: PUBNUB_PUB_KEY, subscribeKey: PUBNUB_SUB_KEY, userId: myId });
    pubnub.addListener({
        message: function(event) {
            if (event.publisher !== myId) {
                globalPlayers[event.publisher] = {
                    coords: event.message.coords,
                    role: event.message.role,
                    lastSeen: Date.now()
                };
            }
        }
    });
    pubnub.subscribe({ channels: [GAME_CHANNEL] });

    startGPSHardware();

    // Fire engines
    requestAnimationFrame(renderRadarLoop);
    if (role === 'marine') {
        playAudibleAudioLoop();
    }
}

function resizeCanvas() {
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function toggleScanlines() {
    document.getElementById('scanline-layer').classList.toggle('active');
}

// --- STEP 2: AUDIO NETWORKING ---
async function loadAudioAssets() {
    try {
        const blipResponse = await fetch('assets/audio/scan-blip.ogg');
        const blipArrayBuffer = await blipResponse.arrayBuffer();
        soundBlipBuffer = await audioCtx.decodeAudioData(blipArrayBuffer);

        const hitResponse = await fetch('assets/audio/scan-hit.ogg');
        const hitArrayBuffer = await hitResponse.arrayBuffer();
        soundHitBuffer = await audioCtx.decodeAudioData(hitArrayBuffer);
    } catch (err) {
        console.error("Audio files missing or blocked by browser:", err);
    }
}

function startUltrasoundEmission() {
    ultrasonicOscillator = audioCtx.createOscillator();
    let gainNode = audioCtx.createGain();
    ultrasonicOscillator.type = 'sine';
    ultrasonicOscillator.frequency.value = TARGET_FREQ;
    gainNode.gain.value = 1.0; 
    ultrasonicOscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    ultrasonicOscillator.start();
}

async function startUltrasoundReception() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
        let source = audioCtx.createMediaStreamSource(micStream);
        fftAnalyser = audioCtx.createAnalyser();
        fftAnalyser.fftSize = 1024; 
        source.connect(fftAnalyser);
    } catch(err) {}
}

function getUltrasoundVolume() {
    if (!fftAnalyser) return 0;
    let dataArray = new Uint8Array(fftAnalyser.frequencyBinCount);
    fftAnalyser.getByteFrequencyData(dataArray);
    let binIndex = Math.round(TARGET_FREQ * fftAnalyser.fftSize / audioCtx.sampleRate);
    return ((dataArray[binIndex-1] + dataArray[binIndex] + dataArray[binIndex+1]) / 3) / 255;
}

// --- STEP 3: LOGICAL TELEMETRY ---
function handleCompass(event) {
    if (event.webkitCompassHeading) {
        compassHeading = event.webkitCompassHeading;
    } else if (event.absolute && event.alpha !== null) {
        compassHeading = 360 - event.alpha;
    }
}

function startGPSHardware() {
    navigator.geolocation.watchPosition(
        (position) => {
            myCoords = { lat: position.coords.latitude, lon: position.coords.longitude };
            pubnub.publish({
                channel: GAME_CHANNEL,
                message: { coords: myCoords, role: role }
            });
        },
        (err) => {},
        { enableHighAccuracy: true, maximumAge: 0 }
    );
}

function calculateBearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const lat1Rad = lat1 * Math.PI / 180;
    const lat2Rad = lat2 * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2Rad);
    const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; 
}

function calculateGpsDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// --- STEP 4: DISPLAY ADVANCED GRAPHICS ---
function renderRadarLoop() {
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;

    // Clear background
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, w, h);

    // Setup coordinates: the center of the tracking grid matches the digital display hub window
    const cx = w / 2;
    const cy = h * 0.76; 
    const maxRadarRadius = w * 0.85; 

    currentUsVolume = (role === 'marine') ? getUltrasoundVolume() : 0;
    nearestTrackingDistance = Infinity;
    const now = Date.now();

    // 1. DRAW ROTATING GRAPHICS ELEMENT (motion.png)
    ctx.save();
    ctx.translate(cx, cy);
    // Rotate canvas coordinate space inversely based on compass orientation
    ctx.rotate(-compassHeading * Math.PI / 180);
    
    // Draw the asset image center-aligned
    if (imgMotion.complete) {
        ctx.drawImage(imgMotion, -maxRadarRadius, -maxRadarRadius, maxRadarRadius * 2, maxRadarRadius * 2);
    }
    ctx.restore();

    // 2. PARSE AND CALCULATE MULTIPLAYER POSITIONS
    let targetsToRender = [];
    for (let id in globalPlayers) {
        if (now - globalPlayers[id].lastSeen > 12000) {
            delete globalPlayers[id];
            continue;
        }

        const target = globalPlayers[id];
        if (!myCoords || !target.coords) continue;

        let distance = calculateGpsDistance(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon);
        if (role === 'marine' && currentUsVolume > 0.04) {
            distance = 15 - (currentUsVolume * 13.5);
        }

        if (distance < nearestTrackingDistance) {
            nearestTrackingDistance = distance;
        }

        let targetBearing = calculateBearing(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon);
        let relativeAngleRad = (targetBearing - compassHeading - 90) * Math.PI / 180; 

        let displayScaleRange = 30; 
        let currentScaleRadius = (Math.min(distance, displayScaleRange) / displayScaleRange) * maxRadarRadius;

        targetsToRender.push({
            x: cx + currentScaleRadius * Math.cos(relativeAngleRad),
            y: cy + currentScaleRadius * Math.sin(relativeAngleRad),
            angle: (relativeAngleRad * 180 / Math.PI + 360) % 360
        });
    }

    // 3. DRAW RADAR SWEEP LINE & RENDER BLIPS
    sweepAngle += 0.035;
    if (sweepAngle > Math.PI * 2) sweepAngle = 0;

    let normalizedSweepAngle = (sweepAngle * 180 / Math.PI + 360) % 360;

    // Render blips when sweep line intersects them
    targetsToRender.forEach(blip => {
        if (Math.abs(normalizedSweepAngle - blip.angle) < 20 || Math.abs(normalizedSweepAngle - blip.angle) > 340) {
            ctx.fillStyle = "rgba(0, 255, 102, 0.95)";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ff66";
            ctx.beginPath();
            ctx.arc(blip.x, blip.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow
        }
    });

    // Draw scanning sweep beam line
    ctx.strokeStyle = "rgba(0, 255, 102, 0.25)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + maxRadarRadius * Math.cos(sweepAngle), cy + maxRadarRadius * Math.sin(sweepAngle));
    ctx.stroke();

    // 4. DRAW AUTHENTIC BOTTOM HUD MASK (edge.png & edge_right.png)
    const hudHeight = h * 0.24; 
    const hudTop = h - hudHeight;
    const cutoutWidth = 120; // Width of center dark window
    const imgWidth = 40;     // Diagonal asset image width dimensions

    // Solid blue panel fields fill out to screen boundaries
    ctx.fillStyle = "#0088ff";
    ctx.fillRect(0, hudTop, cx - (cutoutWidth / 2) - imgWidth, hudHeight);
    ctx.fillRect(cx + (cutoutWidth / 2) + imgWidth, hudTop, w, hudHeight);

    // Left Cutout Slope
    if (imgEdgeLeft.complete) {
        ctx.drawImage(imgEdgeLeft, cx - (cutoutWidth / 2) - imgWidth, hudTop, imgWidth, hudHeight);
    }
    // Right Cutout Slope
    if (imgEdgeRight.complete) {
        ctx.drawImage(imgEdgeRight, cx + (cutoutWidth / 2), hudTop, imgWidth, hudHeight);
    }

    // Dark background box inside center display track window
    ctx.fillStyle = "#010804";
    ctx.fillRect(cx - (cutoutWidth / 2), hudTop, cutoutWidth, hudHeight);

    // 5. DRAW DIGITAL RANGE CODES INFRASTRUCTURE
    if (role === 'marine') {
        ctx.fillStyle = "#ff0000";
        ctx.font = "bold 38px 'Courier New', monospace";
        ctx.textAlign = "center";

        if (nearestTrackingDistance === Infinity) {
            ctx.fillText("00", cx - 10, hudTop + 45);
            ctx.font = "14px 'Courier New', monospace";
            ctx.fillText("00", cx + 25, hudTop + 30);
            ctx.fillText("m", cx + 25, hudTop + 45);
        } else {
            // Split display values for movie accuracy formatting
            let integerPart = Math.floor(nearestTrackingDistance).toString().padStart(2, '0');
            let decimalPart = Math.floor((nearestTrackingDistance % 1) * 100).toString().padStart(2, '0');

            ctx.fillText(integerPart, cx - 10, hudTop + 45);
            ctx.font = "14px 'Courier New', monospace";
            ctx.fillText(decimalPart, cx + 25, hudTop + 30);
            ctx.fillText("m", cx + 25, hudTop + 45);
        }

        // Context structural metadata readout borders
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("F.E.M.S. 3.643.44", 20, hudTop + 35);
        ctx.textAlign = "right";
        ctx.fillText("C.X. 63/67.21", w - 20, hudTop + 35);
    } else {
        ctx.fillStyle = "#00ff66";
        ctx.font = "14px 'Courier New', monospace";
        ctx.textAlign = "center";
        ctx.fillText("NODE ACTIVE", cx, hudTop + 35);
    }

    requestAnimationFrame(renderRadarLoop);
}

// --- STEP 5: INTEGRATED AUDIO PROCESSING LOOP ---
function playAudibleAudioLoop() {
    if (role !== 'marine' || !soundBlipBuffer || !soundHitBuffer) return;

    let nextTimingInterval = 1000; 

    if (nearestTrackingDistance === Infinity) {
        let blipSource = audioCtx.createBufferSource();
        let blipGain = audioCtx.createGain();
        blipSource.buffer = soundBlipBuffer;
        blipGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        blipSource.connect(blipGain);
        blipGain.connect(audioCtx.destination);
        blipSource.start(0);
        nextTimingInterval = 1000; 
    } 
    else {
        let boundedDistance = Math.min(nearestTrackingDistance, 30);
        let ratio = boundedDistance / 30;

        let targetPlaybackRate = 2.0 - ratio;            
        nextTimingInterval = 120 + (ratio * 880);         

        let hitSource = audioCtx.createBufferSource();
        let hitGain = audioCtx.createGain();

        hitSource.buffer = soundHitBuffer;
        hitSource.playbackRate.setValueAtTime(targetPlaybackRate, audioCtx.currentTime);
        hitGain.gain.setValueAtTime(0.5, audioCtx.currentTime);

        hitSource.connect(hitGain);
        hitGain.connect(audioCtx.destination);
        hitSource.start(0);
    }

    setTimeout(playAudibleAudioLoop, nextTimingInterval);
}
</script>
</body>
</html>
