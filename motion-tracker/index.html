<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M41A Unified Motion Tracker</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.1.min.js"></script>
    <style>
        body {
            background-color: #030a05;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        canvas {
            border: 2px solid #004411;
            border-radius: 50%;
            background-color: #010502;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
        }
        .btn {
            background-color: #00ff66;
            color: #020704;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,102,0.4);
        }
        .btn-alt {
            background-color: #004411;
            color: #00ff66;
            border: 1px solid #00ff66;
        }
        #telemetry {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            height: 40px;
        }
    </style>
</head>
<body>

    <!-- SETUP & PERMISSIONS SCREEN -->
    <div id="setup-screen">
        <h2>M41A TELEMETRY LINK</h2>
        <p>Select your operational role for this round:</p>
        <button class="btn" onclick="initTracking('marine')">Deploy Marine</button>
        <button class="btn btn-alt" onclick="initTracking('alien')">Deploy Alien</button>
        <p style="font-size: 11px; color: #00aa44; max-width: 300px;">
            Note: Requires Camera/Mic (for ultrasound processing), Location (GPS), and Motion Sensors (Compass).
        </p>
    </div>

    <!-- ACTIVE RADAR SCREEN -->
    <div id="game-screen">
        <canvas id="radarCanvas" width="360" height="360"></canvas>
        <div id="telemetry">INITIALIZING SCANNER...</div>
    </div>

<script>
// --- CORE CONFIGURATION ---
const PUBNUB_PUB_KEY = 'pub-c-d0d3df8c-4589-4f34-a4f9-f8e19afe8a33'; 
const PUBNUB_SUB_KEY = 'sub-c-577de050-aa10-49d2-911f-b246fb6a450f';
const GAME_CHANNEL = 'aliens-sensor-fusion';
const TARGET_FREQ = 19000; 

// --- APPLICATION STATE ---
let role = ''; 
let pubnub;
let myId = 'p_' + Math.floor(Math.random() * 10000);
let myCoords = null;
let compassHeading = 0; 
let globalPlayers = {};

// Audio variables
let audioCtx = null;
let micStream = null;
let fftAnalyser = null;
let ultrasonicOscillator = null;

// Audio Asset Storage Buffers
let soundBlipBuffer = null; // Idle scan (nothing found)
let soundHitBuffer = null;  // Target scan hit

// UI/Canvas Contexts
let canvas, ctx;
let sweepAngle = 0;

// --- STEP 1: INITIALIZE HARDWARE & PERMISSIONS ---
async function initTracking(selectedRole) {
    role = selectedRole;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    
    canvas = document.getElementById('radarCanvas');
    ctx = canvas.getContext('2d');

    // Initialize Web Audio Context
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Force Screen Wake Lock
    if ('wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }

    // Load Audio Files into Memory Buffers
    if (role === 'marine') {
        await loadAudioAssets();
    }

    // Initialize Audio Channels based on Role
    if (role === 'alien') {
        startUltrasoundEmission();
    } else {
        await startUltrasoundReception();
    }

    // Request Compass Access (Handles iOS permission prompts)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                window.addEventListener('deviceorientation', handleCompass, true);
            }
        } catch (err) { console.error("Compass permission denied", err); }
    } else {
        window.addEventListener('deviceorientationabsolute', handleCompass, true);
        window.addEventListener('deviceorientation', handleCompass, true);
    }

    // Initialize PubNub Connection
    pubnub = new PubNub({ publishKey: PUBNUB_PUB_KEY, subscribeKey: PUBNUB_SUB_KEY, userId: myId });
    pubnub.addListener({
        message: function(event) {
            if (event.publisher !== myId) {
                globalPlayers[event.publisher] = {
                    coords: event.message.coords,
                    role: event.message.role,
                    lastSeen: Date.now()
                };
            }
        }
    });
    pubnub.subscribe({ channels: [GAME_CHANNEL] });

    // Start Geolocation Loop
    startGPSHardware();

    // Start Loops
    requestAnimationFrame(renderRadarLoop);
    if (role === 'marine') {
        playAudibleAudioLoop();
    }
}

// --- STEP 2: AUDIO ASSET STORAGE SYSTEM ---
async function loadAudioAssets() {
    try {
        // Load the background empty scan click (1-second loop asset)
        const blipResponse = await fetch('assets/audio/scan-blip.ogg');
        const blipArrayBuffer = await blipResponse.arrayBuffer();
        soundBlipBuffer = await audioCtx.decodeAudioData(blipArrayBuffer);

        // Load the contact scan hit asset
        const hitResponse = await fetch('assets/audio/scan-hit.ogg');
        const hitArrayBuffer = await hitResponse.arrayBuffer();
        soundHitBuffer = await audioCtx.decodeAudioData(hitArrayBuffer);

        console.log("All track assets successfully loaded into buffers.");
    } catch (err) {
        console.error("Critical error downloading audio tracks:", err);
    }
}

// --- STEP 3: ACOUSTIC ULTRASOUND SYSTEMS ---
function startUltrasoundEmission() {
    ultrasonicOscillator = audioCtx.createOscillator();
    let gainNode = audioCtx.createGain();
    
    ultrasonicOscillator.type = 'sine';
    ultrasonicOscillator.frequency.value = TARGET_FREQ;
    
    gainNode.gain.value = 1.0; 
    ultrasonicOscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    ultrasonicOscillator.start();
}

async function startUltrasoundReception() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
        let source = audioCtx.createMediaStreamSource(micStream);
        fftAnalyser = audioCtx.createAnalyser();
        fftAnalyser.fftSize = 1024; 
        source.connect(fftAnalyser);
    } catch(err) {
        console.error("Microphone access failed", err);
    }
}

function getUltrasoundVolume() {
    if (!fftAnalyser) return 0;
    let bufferLength = fftAnalyser.frequencyBinCount;
    let dataArray = new Uint8Array(bufferLength);
    fftAnalyser.getByteFrequencyData(dataArray);

    let binIndex = Math.round(TARGET_FREQ * fftAnalyser.fftSize / audioCtx.sampleRate);
    let amplitude = (dataArray[binIndex-1] + dataArray[binIndex] + dataArray[binIndex+1]) / 3;
    return amplitude / 255; 
}

// --- STEP 4: SENSOR ORIENTATION & COMPASS ---
function handleCompass(event) {
    if (event.webkitCompassHeading) {
        compassHeading = event.webkitCompassHeading;
    } else if (event.absolute && event.alpha !== null) {
        compassHeading = 360 - event.alpha;
    }
}

function startGPSHardware() {
    navigator.geolocation.watchPosition(
        (position) => {
            myCoords = { lat: position.coords.latitude, lon: position.coords.longitude };
            pubnub.publish({
                channel: GAME_CHANNEL,
                message: { coords: myCoords, role: role }
            });
        },
        (err) => console.error(err),
        { enableHighAccuracy: true, maximumAge: 0 }
    );
}

// --- STEP 5: MATHEMATICAL COORDINATE COUPLING ---
function calculateBearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const lat1Rad = lat1 * Math.PI / 180;
    const lat2Rad = lat2 * Math.PI / 180;

    const y = Math.sin(dLon) * Math.cos(lat2Rad);
    const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
    
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; 
}

function calculateGpsDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// --- STEP 6: GRAPHIC ENGINE LOOP ---
function renderRadarLoop() {
    ctx.fillStyle = "rgba(1, 5, 2, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = cx - 10;

    ctx.strokeStyle = "#003311";
    ctx.lineWidth = 1;
    for (let r = radius / 3; r <= radius; r += radius / 3) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
    }

    let nearestTrackingDistance = Infinity;
    let usVolume = (role === 'marine') ? getUltrasoundVolume() : 0;
    const now = Date.now();

    for (let id in globalPlayers) {
        if (now - globalPlayers[id].lastSeen > 12000) {
            delete globalPlayers[id];
            continue;
        }

        const target = globalPlayers[id];
        if (!myCoords || !target.coords) continue;

        let rawGpsDistance = calculateGpsDistance(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon);
        let finalDisplayDistance = rawGpsDistance;

        const US_THRESHOLD = 0.04;
        if (role === 'marine' && usVolume > US_THRESHOLD) {
            finalDisplayDistance = 15 - (usVolume * 13.5);
        }

        if (finalDisplayDistance < nearestTrackingDistance) {
            nearestTrackingDistance = finalDisplayDistance;
        }

        let targetBearing = calculateBearing(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon);
        let relativeAngleDeg = targetBearing - compassHeading;
        let relativeAngleRad = (relativeAngleDeg - 90) * Math.PI / 180; 

        let displayMaxRange = 30; 
        let currentScaleRadius = (Math.min(finalDisplayDistance, displayMaxRange) / displayMaxRange) * radius;

        let blipX = cx + currentScaleRadius * Math.cos(relativeAngleRad);
        let blipY = cy + currentScaleRadius * Math.sin(relativeAngleRad);

        let normalizedSweepAngle = (sweepAngle * 180 / Math.PI + 360) % 360;
        let normalizedBlipAngle = (relativeAngleRad * 180 / Math.PI + 360) % 360;
        
        if (Math.abs(normalizedSweepAngle - normalizedBlipAngle) < 15 || Math.abs(normalizedSweepAngle - normalizedBlipAngle) > 345) {
            ctx.fillStyle = "rgba(0, 255, 102, 0.9)";
            ctx.beginPath();
            ctx.arc(blipX, blipY, 7, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const telemetry = document.getElementById('telemetry');
    if (role === 'alien') {
        telemetry.innerHTML = `TRANSMITTING ACOUSTIC ULTRASOUND FREQ...<br>ROLE: XENOMORPH RESIDENT`;
    } else {
        if (nearestTrackingDistance === Infinity) {
            telemetry.innerHTML = `SEARCHING TELEMETRY SECTORS...<br>NO TARGETS DETECTED`;
        } else {
            telemetry.innerHTML = `RANGE: ${nearestTrackingDistance.toFixed(1)}M<br>US-AMP LOCK: ${usVolume.toFixed(3)}`;
        }
    }

    sweepAngle += 0.04; 
    if (sweepAngle > Math.PI * 2) sweepAngle = 0;

    ctx.strokeStyle = "rgba(0, 255, 102, 0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(sweepAngle), cy + radius * Math.sin(sweepAngle));
    ctx.stroke();

    requestAnimationFrame(renderRadarLoop);
}

// --- STEP 7: DUAL AUDIO FILE INTEGRATION ENGINE ---
function playAudibleAudioLoop() {
    if (role !== 'marine' || !soundBlipBuffer || !soundHitBuffer) return;

    let lowestDistance = Infinity;
    let usVolume = getUltrasoundVolume();

    // Determine target proximity across active connections
    for (let id in globalPlayers) {
        if (!myCoords || !globalPlayers[id].coords) continue;
        let d = calculateGpsDistance(myCoords.lat, myCoords.lon, globalPlayers[id].coords.lat, globalPlayers[id].coords.lon);
        
        if (usVolume > 0.04) {
            d = 15 - (usVolume * 13.5);
        }
        if (d < lowestDistance) lowestDistance = d;
    }

    let nextTimingInterval = 1000; // Default 1 second idle tempo

    // CASE 1: No targets within range -> Play standard scan loop click once per second
    if (lowestDistance === Infinity) {
        let blipSource = audioCtx.createBufferSource();
        let blipGain = audioCtx.createGain();

        blipSource.buffer = soundBlipBuffer;
        blipGain.gain.setValueAtTime(0.3, audioCtx.currentTime);

        blipSource.connect(blipGain);
        blipGain.connect(audioCtx.destination);
        blipSource.start(0);

        nextTimingInterval = 1000; // Force exact 1 second interval
    } 
    // CASE 2: Alien Detected -> Suppress idle click, scale up target hit audio instead
    else {
        let boundedDistance = Math.min(lowestDistance, 30);
        let ratio = boundedDistance / 30;

        // Closer means faster tempo and higher playback rate/pitch alteration
        let targetPlaybackRate = 2.0 - ratio;            // 1.0 (normal) up to 2.0 (fast/high pitched)
        nextTimingInterval = 120 + (ratio * 880);         // 120ms (touching) up to 1000ms (outer boundary)

        let hitSource = audioCtx.createBufferSource();
        let hitGain = audioCtx.createGain();

        hitSource.buffer = soundHitBuffer;
        hitSource.playbackRate.setValueAtTime(targetPlaybackRate, audioCtx.currentTime);
        hitGain.gain.setValueAtTime(0.5, audioCtx.currentTime);

        hitSource.connect(hitGain);
        hitGain.connect(audioCtx.destination);
        hitSource.start(0);
    }

    // Schedule next sound playback frame dynamically
    setTimeout(playAudibleAudioLoop, nextTimingInterval);
}
</script>
</body>
</html>
