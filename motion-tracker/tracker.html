<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M41A Tactical Motion Tracker</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.1.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 9999;
        }
        #game-container {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
        }
        #radarCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .btn {
            background-color: #00ff66;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,102,0.4);
            border-radius: 4px;
        }
        .btn-alt {
            background-color: #002208;
            color: #00ff66;
            border: 1px solid #00ff66;
        }
        #config-trigger {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 30, 10, 0.9);
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        #config-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: rgba(1, 8, 4, 0.95);
            border: 2px solid #00ff66;
            padding: 20px;
            z-index: 1001;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            border-radius: 8px;
        }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; color: #ffffff; }
        .config-row { display: flex; gap: 10px; }
        .config-btn { flex: 1; background: #002208; border: 1px solid #00ff66; color: #00ff66; padding: 8px; font-size: 12px; cursor: pointer; border-radius: 4px; }
        .config-btn.active { background: #00ff66; color: #000000; font-weight: bold; }
        .config-slider { width: 100%; accent-color: #00ff66; }
        .spacer { height: 1px; background: #00ff66; opacity: 0.3; margin: 15px 0; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%); background-size: 100% 4px; z-index: 20; pointer-events: none; display: none; }
        .scanlines.active { display: block; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>M41A SENSOR LINKUP</h2>
        <button class="btn" onclick="initTracking('marine')">Deploy Marine</button>
        <button class="btn btn-alt" style="margin-top: 10px;" onclick="initTracking('alien')">Deploy Alien</button>
    </div>

    <div id="game-container">
        <div id="scanline-layer" class="scanlines"></div>
        <canvas id="radarCanvas"></canvas>
        <button id="config-trigger" onclick="toggleConfigMenu()">⚙ CALIBRATE</button>

        <div id="config-menu">
            <h3 style="margin-top: 0; text-align: center; font-size: 16px; border-bottom: 1px solid #00ff66; padding-bottom: 10px;">SYSTEM CALIBRATION</h3>
            <div class="config-group">
                <label>Compass Rotation Correction</label>
                <div class="config-row">
                    <button class="config-btn" id="deg-0" onclick="setCompassOffset(0)">0°</button>
                    <button class="config-btn" id="deg-90" onclick="setCompassOffset(90)">+90°</button>
                    <button class="config-btn" id="deg-270" onclick="setCompassOffset(-90)">-90°</button>
                </div>
            </div>
            <div class="config-group">
                <label>Indoor Range Scaling: <span id="multiplier-val">1.0</span>x</label>
                <input type="range" class="config-slider" min="0.1" max="3.0" step="0.1" value="1.0" id="dist-slider" oninput="updateDistanceMultiplier(this.value)">
            </div>
            <div class="spacer"></div>
            <div class="config-group">
                <button class="btn btn-alt" style="width: 100%; padding: 10px; font-size: 14px;" onclick="toggleScanlines()">Toggle Scanlines Overlay</button>
            </div>
            <button class="btn" style="width: 100%; padding: 12px; font-size: 14px;" onclick="toggleConfigMenu()">Apply & Close</button>
        </div>
    </div>

<script>
const PUBNUB_PUB_KEY = 'YOUR_PUBLISH_KEY_HERE';
const PUBNUB_SUB_KEY = 'YOUR_SUBSCRIBE_KEY_HERE';
const GAME_CHANNEL = 'aliens-sensor-fusion';
const TARGET_FREQ = 19000; 

let role = '', pubnub, myId = 'p_' + Math.floor(Math.random() * 10000), myCoords = null, compassHeading = 0, compassOffset = 0, distanceMultiplier = 1.0, globalPlayers = {};
let audioCtx, micStream, fftAnalyser, ultrasonicOscillator, soundBlipBuffer, soundHitBuffer;
let imgMotion = new Image();
imgMotion.src = 'assets/gfx/motion.png';

let canvas, ctx, sweepAngle = 0, nearestTrackingDistance = Infinity, currentUsVolume = 0, blipHistory = {};

async function initTracking(selectedRole) {
    role = selectedRole;
    document.getElementById('setup-screen').remove();
    document.getElementById('game-container').style.display = 'block';
    canvas = document.getElementById('radarCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    setCompassOffset(0);

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch(e) {}

    if (role === 'marine') { await loadAudioAssets(); await startUltrasoundReception(); } else { startUltrasoundEmission(); }

    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { const permission = await DeviceOrientationEvent.requestPermission(); if (permission === 'granted') window.addEventListener('deviceorientation', handleCompass, true); } catch (err) {}
    } else { window.addEventListener('deviceorientationabsolute', handleCompass, true); window.addEventListener('deviceorientation', handleCompass, true); }

    pubnub = new PubNub({ publishKey: PUBNUB_PUB_KEY, subscribeKey: PUBNUB_SUB_KEY, userId: myId });
    pubnub.addListener({ message: function(event) { if (event.publisher !== myId) globalPlayers[event.publisher] = { coords: event.message.coords, role: event.message.role, lastSeen: Date.now() }; } });
    pubnub.subscribe({ channels: [GAME_CHANNEL] });

    startGPSHardware();
    requestAnimationFrame(renderRadarLoop);
    if (role === 'marine') playAudibleAudioLoop();
}

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function toggleScanlines() { document.getElementById('scanline-layer').classList.toggle('active'); }
function toggleConfigMenu() { const menu = document.getElementById('config-menu'); menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; }
function setCompassOffset(degrees) {
    compassOffset = degrees;
    document.querySelectorAll('.config-btn').forEach(b => b.classList.remove('active'));
    if (degrees === 0) document.getElementById('deg-0').classList.add('active');
    else if (degrees === 90) document.getElementById('deg-90').classList.add('active');
    else if (degrees === -90) document.getElementById('deg-270').classList.add('active');
}
function updateDistanceMultiplier(val) { distanceMultiplier = parseFloat(val); document.getElementById('multiplier-val').innerText = val; }

async function loadAudioAssets() { try { const blipResponse = await fetch('assets/audio/scan-blip.ogg'); const blipArrayBuffer = await blipResponse.arrayBuffer(); soundBlipBuffer = await audioCtx.decodeAudioData(blipArrayBuffer); const hitResponse = await fetch('assets/audio/scan-hit.ogg'); const hitArrayBuffer = await hitResponse.arrayBuffer(); soundHitBuffer = await audioCtx.decodeAudioData(hitArrayBuffer); } catch (err) {} }
function startUltrasoundEmission() { ultrasonicOscillator = audioCtx.createOscillator(); let gainNode = audioCtx.createGain(); ultrasonicOscillator.type = 'sine'; ultrasonicOscillator.frequency.value = TARGET_FREQ; gainNode.gain.value = 1.0; ultrasonicOscillator.connect(gainNode); gainNode.connect(audioCtx.destination); ultrasonicOscillator.start(); }
async function startUltrasoundReception() { try { micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } }); let source = audioCtx.createMediaStreamSource(micStream); fftAnalyser = audioCtx.createAnalyser(); fftAnalyser.fftSize = 1024; source.connect(fftAnalyser); } catch(err) {} }
function getUltrasoundVolume() { if (!fftAnalyser) return 0; let dataArray = new Uint8Array(fftAnalyser.frequencyBinCount); fftAnalyser.getByteFrequencyData(dataArray); let binIndex = Math.round(TARGET_FREQ * fftAnalyser.fftSize / audioCtx.sampleRate); return ((dataArray[binIndex-1] + dataArray[binIndex] + dataArray[binIndex+1]) / 3) / 255; }
function handleCompass(event) { if (event.webkitCompassHeading) compassHeading = event.webkitCompassHeading; else if (event.absolute && event.alpha !== null) compassHeading = 360 - event.alpha; }
function startGPSHardware() { navigator.geolocation.watchPosition((position) => { myCoords = { lat: position.coords.latitude, lon: position.coords.longitude }; pubnub.publish({ channel: GAME_CHANNEL, message: { coords: myCoords, role: role } }); }, (err) => {}, { enableHighAccuracy: true, maximumAge: 0 }); }
function calculateBearing(lat1, lon1, lat2, lon2) { const dLon = (lon2 - lon1) * Math.PI / 180; const lat1Rad = lat1 * Math.PI / 180; const lat2Rad = lat2 * Math.PI / 180; const y = Math.sin(dLon) * Math.cos(lat2Rad); const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon); return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; }
function calculateGpsDistance(lat1, lon1, lat2, lon2) { const R = 6371000; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); }
function getCardinalHeading(deg) { const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW']; return `${Math.round(deg).toString().padStart(3, '0')}° ${directions[Math.round(deg / 22.5) % 16]}`; }

function renderRadarLoop() {
    const w = canvas.width, h = canvas.height, cx = w / 2;
    const hudHeight = Math.max(h * 0.24, 180), hudTop = h - hudHeight, cutoutDepth = 70;
    
    ctx.fillStyle = "#010815"; ctx.fillRect(0, 0, w, h);

    sweepAngle += 0.035; if (sweepAngle > Math.PI * 2) sweepAngle = 0;
    const now = Date.now(), modifiedHeading = compassHeading + compassOffset, normalizedSweepAngle = (sweepAngle * 180 / Math.PI + 360) % 360;
    
    ctx.save(); ctx.translate(cx, hudTop); ctx.rotate(-modifiedHeading * Math.PI / 180);
    const imgSize = Math.min(cx, hudTop) * 0.9;
    if (imgMotion.complete) ctx.drawImage(imgMotion, -imgSize, -imgSize, imgSize * 2, imgSize * 2);
    ctx.restore();

    for (let id in globalPlayers) {
        if (now - globalPlayers[id].lastSeen > 12000) { delete globalPlayers[id]; delete blipHistory[id]; continue; }
        const target = globalPlayers[id];
        if (!myCoords || !target.coords) continue;
        let dist = calculateGpsDistance(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon) * distanceMultiplier;
        if (role === 'marine' && currentUsVolume > 0.04) dist = 15 - (currentUsVolume * 13.5);
        if (dist < nearestTrackingDistance) nearestTrackingDistance = dist;
        const bearing = calculateBearing(myCoords.lat, myCoords.lon, target.coords.lat, target.coords.lon);
        const relAngleRad = (bearing - modifiedHeading - 90) * Math.PI / 180;
        const scale = (Math.min(dist, 30) / 30) * imgSize;
        const bx = cx + scale * Math.cos(relAngleRad), by = hudTop + scale * Math.sin(relAngleRad);
        const bAngle = (relAngleRad * 180 / Math.PI + 360) % 360;
        if (Math.abs(normalizedSweepAngle - bAngle) < 20) blipHistory[id] = now;
        if (blipHistory[id]) {
            const age = now - blipHistory[id], alpha = Math.max(0, 1 - (age / 1800));
            if (alpha > 0) {
                ctx.globalAlpha = alpha; ctx.shadowBlur = 25; ctx.shadowColor = "#44ffff"; ctx.fillStyle = "#44ffff";
                ctx.beginPath(); ctx.arc(bx, by, 18, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
            }
        }
    }

    ctx.fillStyle = "#010815"; ctx.beginPath(); ctx.moveTo(cx - 85, hudTop); ctx.lineTo(cx - 60, hudTop + cutoutDepth); ctx.lineTo(cx + 60, hudTop + cutoutDepth); ctx.lineTo(cx + 85, hudTop); ctx.fill();
    ctx.fillStyle = "#0088ff"; ctx.beginPath(); ctx.moveTo(0, hudTop); ctx.lineTo(cx - 85, hudTop); ctx.lineTo(cx - 60, hudTop + cutoutDepth); ctx.lineTo(cx + 60, hudTop + cutoutDepth); ctx.lineTo(cx + 85, hudTop); ctx.lineTo(w, hudTop); ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();

    ctx.fillStyle = "#ff0000"; ctx.textAlign = "center";
    if (role === 'marine') {
        const d = (nearestTrackingDistance === Infinity) ? ["00", "00"] : [Math.floor(nearestTrackingDistance).toString().padStart(2, '0'), Math.floor((nearestTrackingDistance % 1) * 100).toString().padStart(2, '0')];
        ctx.font = "bold 44px 'Courier New', monospace"; ctx.fillText(d[0], cx - 15, hudTop + 35);
        ctx.font = "bold 16px 'Courier New', monospace"; ctx.textAlign = "left"; ctx.fillText(d[1], cx + 22, hudTop + 14); ctx.fillText("m", cx + 22, hudTop + 32);
        ctx.fillStyle = "#00ff66"; ctx.font = "bold 15px 'Courier New', monospace"; ctx.textAlign = "center"; ctx.fillText(getCardinalHeading(modifiedHeading), cx, hudTop + 62);
    } else { ctx.fillStyle = "#00ff66"; ctx.font = "bold 16px 'Courier New', monospace"; ctx.fillText("NODE ACTIVE", cx, hudTop + 30); ctx.fillStyle = "#ffffff"; ctx.fillText(getCardinalHeading(modifiedHeading), cx, hudTop + 55); }

    requestAnimationFrame(renderRadarLoop);
}
function playAudibleAudioLoop() {
    if (role !== 'marine' || !soundBlipBuffer || !soundHitBuffer) return;
    let interval = 1000;
    if (nearestTrackingDistance !== Infinity) {
        let ratio = Math.min(nearestTrackingDistance, 30) / 30;
        interval = 1000 + (ratio * 2000);
        let src = audioCtx.createBufferSource(), gain = audioCtx.createGain();
        src.buffer = soundHitBuffer; src.playbackRate.setValueAtTime(2.0 - ratio, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); src.connect(gain); gain.connect(audioCtx.destination); src.start(0);
    } else {
        let src = audioCtx.createBufferSource(), gain = audioCtx.createGain();
        src.buffer = soundBlipBuffer; gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        src.connect(gain); gain.connect(audioCtx.destination); src.start(0);
    }
    setTimeout(playAudibleAudioLoop, interval);
}
</script>
</body>
</html>
