<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Buzzer Studio Pro - 8 Player Edition</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; font-family: sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Setup Menu */
        #setup {
            position: fixed; inset: 0; background: #1a1a1a; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: start;
            z-index: 200; padding: 20px; text-align: center; overflow-y: auto;
        }
        .row { margin: 8px 0; width: 100%; max-width: 500px; text-align: left; }
        select, button, input[type="text"] { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
            border: none; font-size: 1rem; cursor: pointer; box-sizing: border-box; 
        }
        input[type="text"] { background: #333; color: white; border: 1px solid #555; text-align: center; }
        input[type="text"]:focus { background: #444; border-color: #3498db; outline: none; }
        
        #load-btn { background: #3498db; color: white; }
        #start-btn { background: #27ae60; color: white; font-weight: bold; display: none; }
        
        /* Grid for 8 Player Configs */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 15px 0;
        }
        .player-card {
            background: #2b2b2b;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #555;
        }

        /* Spectator / Display Screen */
        #stage {
            display: none;
            position: fixed; inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: background-color 0.2s;
            background-color: #111;
        }

        .display-txt {
            color: white; font-size: 5rem; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            text-align: center;
            user-select: none;
            padding: 20px;
        }
        .sub-txt {
            color: #888; font-size: 1.5rem; margin-top: 20px;
        }

        /* Quit Button Styles */
        #quit-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            background: #222;
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: none;
            align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            -webkit-tap-highlight-color: transparent;
            width: 60px; height: 60px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Buzzer Studio (8-Player Keyboard Edition)</h1>
        
        <div class="row">
            <button id="load-btn" onclick="document.getElementById('file-input').click()">📁 1. Load Sounds</button>
            <input type="file" id="file-input" accept="audio/*" multiple style="display:none">
        </div>

        <div class="player-grid" id="config-grid">
            </div>

        <div class="row">
            <button id="start-btn" onclick="startGame()">🚀 2. START GAME</button>
        </div>
    </div>

    <div id="stage">
        <div id="main-display" class="display-txt">READY TO BUZZ</div>
        <div id="sub-display" class="sub-txt">Press any assigned key to lock in</div>
    </div>

    <div id="quit-btn" onclick="confirmQuit()">QUIT</div>

    <script>
        const audioLibrary = {};
        let isLocked = false;
        const totalPlayers = 8;
        
        // Default unique key mappings for 8 players
        const defaultKeys = ['1', '2', '3', '4', '5', '6', '7', '8'];
        const playerColors = [
            '#e74c3c', '#3498db', '#2ecc71', '#f1c40f', 
            '#9b59b6', '#e67e22', '#1abc9c', '#e84393'
        ];

        const stage = document.getElementById('stage');
        const quit = document.getElementById('quit-btn');
        const mainDisplay = document.getElementById('main-display');
        const subDisplay = document.getElementById('sub-display');

        // Dynamically build the configuration UI for 8 players
        const configGrid = document.getElementById('config-grid');
        for (let i = 1; i <= totalPlayers; i++) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.style.borderLeftColor = playerColors[i-1];
            card.innerHTML = `
                <strong style="color: ${playerColors[i-1]}">Player ${i}</strong>
                <div style="margin-top: 5px;">
                    <label style="font-size:0.8rem; color:#aaa;">Trigger Key:</label>
                    <input type="text" id="key-p${i}" max-length="1" value="${defaultKeys[i-1]}" onfocus="captureNextKey(this)">
                </div>
                <div style="margin-top: 5px;">
                    <label style="font-size:0.8rem; color:#aaa;">Sound:</label>
                    <select id="sel-p${i}"></select>
                </div>
            `;
            configGrid.appendChild(card);
        }

        // Helper to easily bind key configuration by listening to a keystroke
        function captureNextKey(inputElement) {
            inputElement.value = "Press any key...";
            const listenForSingleKey = (e) => {
                e.preventDefault();
                inputElement.value = e.key.toUpperCase();
                inputElement.blur();
                window.removeEventListener('keydown', listenForSingleKey);
            };
            window.addEventListener('keydown', listenForSingleKey);
        }

        // Process uploaded audio files
        document.getElementById('file-input').addEventListener('change', (e) => {
            // Clear existing options
            for (let i = 1; i <= totalPlayers; i++) {
                document.getElementById(`sel-p${i}`).innerHTML = '';
            }

            for (let file of e.target.files) {
                if (file.type.includes('audio') || file.name.endsWith('.mp3')) {
                    const url = URL.createObjectURL(file);
                    audioLibrary[file.name] = url;
                    
                    // Add sound file to all 8 dropdowns
                    for (let i = 1; i <= totalPlayers; i++) {
                        document.getElementById(`sel-p${i}`).add(new Option(file.name, file.name));
                    }
                }
            }

            if (Object.keys(audioLibrary).length > 0) {
                // Stagger default selections so players don't all have the exact same sound if multiple loaded
                for (let i = 1; i <= totalPlayers; i++) {
                    const select = document.getElementById(`sel-p${i}`);
                    if (select.options.length > (i - 1)) {
                        select.selectedIndex = i - 1;
                    }
                }
                document.getElementById('start-btn').style.display = 'block';
            }
        });

        function startGame() {
            document.getElementById('setup').style.display = 'none';
            stage.style.display = 'flex';
            quit.style.display = 'flex';
            resetStage();
            
            // Start listening for keyboard game triggers
            window.addEventListener('keydown', handleGameKeyPress);
        }

        function confirmQuit() {
            if(confirm("Exit to menu?")) {
                location.reload();
            }
        }

        function resetStage() {
            isLocked = false;
            stage.style.backgroundColor = '#111';
            mainDisplay.innerText = "READY TO BUZZ";
            subDisplay.innerText = "Waiting for players...";
        }

        // Central logic handling game inputs
        function handleGameKeyPress(e) {
            // If locked out, ignore inputs unless it's a reset action by the host/MC
            if (isLocked) {
                if (e.key === 'Escape' || e.key === ' ') { 
                    resetStage(); 
                }
                return;
            }

            const pressedKey = e.key.toUpperCase();

            // Check if the pressed key matches any registered player keys
            for (let i = 1; i <= totalPlayers; i++) {
                const targetKey = document.getElementById(`key-p${i}`).value.toUpperCase();
                
                if (pressedKey === targetKey) {
                    triggerBuzzer(i);
                    break;
                }
            }
        }

        function triggerBuzzer(playerNum) {
            isLocked = true;
            
            // Visual indicators for who won the lockout
            const color = playerColors[playerNum - 1];
            stage.style.backgroundColor = color;
            mainDisplay.innerText = `PLAYER ${playerNum}`;
            subDisplay.innerText = "LOCKED OUT! (Press Spacebar or ESC to Reset)";

            // Audio lookup & execution
            const fileName = document.getElementById(`sel-p${playerNum}`).value;
            if (audioLibrary[fileName]) {
                const audio = new Audio(audioLibrary[fileName]);
                audio.currentTime = 0;
                audio.play().catch(err => console.log("Playback blocked or interrupted: ", err));
            }
        }
    </script>
</body>
</html>
