<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification - CAPTCHA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.15/dist/face-api.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff; 
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #captcha-container {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            padding: 32px;
            max-width: 760px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .captcha-header {
            background: #1a73e8;
            color: white;
            padding: 18px;
            margin: -32px -32px 24px -32px;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
            text-align: left;
        }

        .captcha-header h2 { margin: 0; font-size: 1.5rem; font-weight: 500; letter-spacing: 0.25px; }
        .captcha-header p { margin: 4px 0 0 0; font-size: 0.95rem; opacity: 0.9; }

        .camera-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            margin: 0 auto 24px auto;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #dcdcdc;
        }

        video, #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
        }

        #overlay-canvas {
            z-index: 2;
            pointer-events: none;
        }

        .progress-container {
            width: 100%;
            background-color: #f1f3f4;
            border-radius: 10px;
            height: 16px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #34a853;
            transition: width 0.1s linear;
        }

        #prompt-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        #scold-banner {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #d93025;
            padding: 12px;
            border-radius: 4px;
            margin: 12px 0 20px 0;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #scold-banner.visible { opacity: 1; }
        #success-screen { display: none; padding: 50px 10px; }
        .success-icon { color: #34a853; font-size: 5.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="captcha-container">
        <div class="captcha-header">
            <h2>ExpressionCAPTCHA™</h2>
            <p>Biometric Verification Portal (Visual Debug Mode)</p>
        </div>

        <div id="game-play">
            <div id="prompt-text">Downloading dataset matrix...</div>
            <div id="scold-banner">Analyzing tracking points...</div>
            
            <div class="camera-box">
                <video id="webcam" autoplay muted playsinline></video>
                <canvas id="overlay-canvas"></canvas>
            </div>

            <label style="font-size:0.9rem; font-weight:700; color:#5f6368; text-transform:uppercase; letter-spacing: 0.75px;">
                Verification Hold Progress:
            </label>
            <div class="progress-container">
                <div id="hold-progress" class="progress-bar"></div>
            </div>
        </div>

        <div id="success-screen">
            <div class="success-icon">✓</div>
            <h3 style="margin:0; color:#202124; font-size:1.8rem;">Verification Confirmed</h3>
            <p style="color:#5f6368; margin-top:10px; font-size:1.1rem;">Forwarding destination terminal request...</p>
        </div>
    </div>

    <script>
        // =========================================================================
        // CONFIGURATION PARAMETERS
        // =========================================================================
        const SUCCESS_REDIRECT_URL = "https://www.google.com"; 
        const DATASET_FILE_URL = "hd_expression_dataset.json"; 
        // =========================================================================

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay-canvas');
        const gameplayDiv = document.getElementById('game-play');
        const successScreen = document.getElementById('success-screen');
        const promptText = document.getElementById('prompt-text');
        const scoldBanner = document.getElementById('scold-banner');
        const progressBar = document.getElementById('hold-progress');

        let trainedProfiles = [];
        let randomizedExpressionsQueue = [];
        let currentChallengeIndex = 0;
        let mobileOptimizedOptions = null;

        let matchingFramesCounterCount = 0;
        const TARGET_HOLD_MS = 3000; // Dropped to 3 seconds for less user fatigue
        const FRAME_INTERVAL_MS = 100;
        const REQUIRED_MATCHING_FRAMES = TARGET_HOLD_MS / FRAME_INTERVAL_MS;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Background Asset Loader Loop with Strict Format Interrogation
async function initApplication() {
    gameplayDiv.style.display = 'block';
    promptText.innerHTML = `Downloading dataset matrix...`;
    
    try {
        // Clear cache tracking by appending a dynamic execution timestamp query
        const cacheBusterUrl = `${DATASET_FILE_URL}?t=${new Date().getTime()}`;
        const response = await fetch(cacheBusterUrl);
        
        if (!response.ok) {
            throw new Error(`Server responded with HTTP code ${response.status}. Verify the file isn't missing.`);
        }

        const rawTextData = await response.text();
        
        try {
            trainedProfiles = JSON.parse(rawTextData);
        } catch (jsonErr) {
            throw new Error(`JSON Formatting Syntax Error: ${jsonErr.message}. Ensure your exported file isn't corrupted.`);
        }

        if (!Array.isArray(trainedProfiles) || trainedProfiles.length === 0) {
            throw new Error("Dataset found, but the internal array is empty. Re-run trainer.html to populate vectors.");
        }

        // Structural verification: Check if data is pixel-based or normalized percentages
        const sampleRecord = trainedProfiles[0];
        if (sampleRecord && sampleRecord.landmarksCoordinates && sampleRecord.landmarksCoordinates[0]) {
            const sampleCoordinate = sampleRecord.landmarksCoordinates[0].x;
            if (sampleCoordinate > 1) {
                throw new Error(`Legacy Data Conflict: The dataset contains pixel values (e.g. ${Math.round(sampleCoordinate)}px) instead of normalized decimals (e.g. 0.45). You must record new profiles using the updated tracker template.`);
            }
        }

        const uniqueKeys = [...new Set(trainedProfiles.map(p => p.expressionLabel))];
        randomizedExpressionsQueue = shuffleArray(uniqueKeys);

        promptText.innerHTML = `Initializing tracking engines...`;
        await initAIModels();
        bootWebcam();

    } catch (err) {
        // Force the hidden engine crash to print natively on your mobile phone screen
        promptText.innerHTML = `
            <span style="color:#d93025; font-weight:bold;">Matrix Connection Halted:</span><br>
            <span style="font-size:0.95rem; color:#333; display:inline-block; margin-top:8px; background:#fff5f5; padding:8px; border:1px solid #d93025; border-radius:4px; text-align:left;">
                ${err.message}
            </span>
        `;
        console.error("Critical Runtime Error Details:", err);
    }
}

        async function initAIModels() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                mobileOptimizedOptions = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
            } catch (err) { throw new Error(`Model error: ${err.message}`); }
        }

        function bootWebcam() {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
            })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => { 
                    updateChallengePrompt(); 
                    executeTrackingLoop(); 
                };
            })
            .catch(err => alert("Camera configuration rejected."));
        }

        function updateChallengePrompt() {
            if (currentChallengeIndex < randomizedExpressionsQueue.length) {
                matchingFramesCounterCount = 0;
                progressBar.style.width = '0%';
                scoldBanner.classList.remove('visible');
                const promptLabel = randomizedExpressionsQueue[currentChallengeIndex].toUpperCase().replace('_', ' ');
                promptText.innerHTML = `VERIFY IDENTITY:<br><span style="color:#1a73e8; font-size:1.6rem;">HOLD "${promptLabel}" NOW</span>`;
            } else {
                gameplayDiv.style.display = 'none';
                successScreen.style.display = 'block';
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                setTimeout(() => { window.location.href = SUCCESS_REDIRECT_URL; }, 400); 
            }
        }

        async function executeTrackingLoop() {
    if (video.paused || video.ended || currentChallengeIndex >= randomizedExpressionsQueue.length) return;

    const detection = await faceapi.detectSingleFace(video, mobileOptimizedOptions).withFaceLandmarks();
    const ctx = canvas.getContext('2d');

    if (detection) {
        const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
        faceapi.matchDimensions(canvas, displaySize);

        // 1. Scale the raw detection map to match the CSS viewport bounds
        const resizedResults = faceapi.resizeResults(detection, displaySize);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        faceapi.draw.drawFaceLandmarks(canvas, resizedResults);

        const targetGoalLabel = randomizedExpressionsQueue[currentChallengeIndex];
        
        // 2. Pass the RESIZED result so coordinates line up perfectly
        const matchedExpression = evaluateFaceKNN(resizedResults);

        if (matchedExpression === targetGoalLabel) {
            matchingFramesCounterCount++;
            if (matchingFramesCounterCount > 3) scoldBanner.classList.remove('visible');
            progressBar.style.width = `${Math.min((matchingFramesCounterCount / REQUIRED_MATCHING_FRAMES) * 100, 100)}%`;

            if (matchingFramesCounterCount >= REQUIRED_MATCHING_FRAMES) {
                currentChallengeIndex++;
                updateChallengePrompt();
            }
        } else {
            if (matchingFramesCounterCount > 0) {
                matchingFramesCounterCount = Math.max(0, matchingFramesCounterCount - 3);
                progressBar.style.width = `${(matchingFramesCounterCount / REQUIRED_MATCHING_FRAMES) * 100}%`;
            }
            
            const cleanActual = matchedExpression.replace('_', ' ');
            const cleanTarget = targetGoalLabel.replace('_', ' ');
            scoldBanner.innerText = `⚠️ Detected: "${cleanActual}" (Looking for: "${cleanTarget}")`;
            scoldBanner.classList.add('visible');
        }
    } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    
    setTimeout(() => executeTrackingLoop(), FRAME_INTERVAL_MS);
}

        function evaluateFaceKNN(liveDetection) {
    let closestLabelName = null;
    let minimumVarianceScore = Infinity;

    // Correctly pull the box and positions from the matched frame properties
    const box = liveDetection.detection.box;
    const livePoints = liveDetection.landmarks.positions;

    // Normalize coordinate metrics cleanly 
    const normalizedLive = livePoints.map(p => ({
        x: (p.x - box.x) / box.width,
        y: (p.y - box.y) / box.height
    }));

    for (let profile of trainedProfiles) {
        let cumulativeDistanceVariance = 0;
        const baselinePoints = profile.landmarksCoordinates;

        for (let i = 0; i < 68; i++) {
            if (!baselinePoints[i] || !normalizedLive[i]) continue;
            const diffX = baselinePoints[i].x - normalizedLive[i].x;
            const diffY = baselinePoints[i].y - normalizedLive[i].y;
            cumulativeDistanceVariance += Math.sqrt(diffX * diffX + diffY * diffY);
        }

        if (cumulativeDistanceVariance < minimumVarianceScore) {
            minimumVarianceScore = cumulativeDistanceVariance;
            closestLabelName = profile.expressionLabel;
        }
    }

    // Sweet-spot tolerance threshold for percentage variations
    const MAX_ALLOWED_DISTANCE_VARIANCE_TOLERANCE = 3.5; 
    return (minimumVarianceScore < MAX_ALLOWED_DISTANCE_VARIANCE_TOLERANCE) ? closestLabelName : "unknown";
}

            // Expanded tolerance slightly to 3.2 to make matching easier on phones
            const MAX_ALLOWED_DISTANCE_VARIANCE_TOLERANCE = 3.2; 
            return (minimumVarianceScore < MAX_ALLOWED_DISTANCE_VARIANCE_TOLERANCE) ? closestLabelName : "unknown";
        }

        initApplication();
    </script>
</body>
</html>
